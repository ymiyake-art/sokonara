<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ソコナラ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal:     #42AD9F;
  --teal-d:   #2e8c7f;
  --teal-bg:  rgba(66,173,159,0.08);
  --teal-mid: rgba(66,173,159,0.16);
  --navy:     #1C2A54;
  --navy-bg:  rgba(28,42,84,0.06);
  --navy-mid: rgba(28,42,84,0.12);
  --gray:     #716C6B;
  --light:    #E4E3E3;
  --white:    #ffffff;
  --bg:       #F5F5F5;
  --text:     #1a1a1a;
  --text2:    #716C6B;
  --text3:    #aaa8a7;
  --border:   #E4E3E3;
  --hot:      #c0341a;
  --hot-bg:   rgba(192,52,26,0.07);
  --warm:     #b07818;
  --warm-bg:  rgba(176,120,24,0.07);
  --cool:     #1C2A54;
  --cool-bg:  rgba(28,42,84,0.06);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ===== MODE SWITCHER (top nav) ===== */
.mode-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 300;
  background: var(--navy);
  display: flex; align-items: center;
  height: 48px; padding: 0 20px; gap: 0;
  box-shadow: 0 1px 0 rgba(255,255,255,0.06);
}
.mode-brand {
  font-family: 'Noto Serif JP', serif;
  font-size: 16px; font-weight: 700;
  color: #fff; letter-spacing: 0.06em;
  margin-right: 24px; flex-shrink: 0;
}
.mode-brand span { color: var(--teal); }
.mode-btn {
  padding: 0 16px; height: 48px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,0.45);
  background: none; border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.mode-btn:hover { color: rgba(255,255,255,0.8); }
.mode-btn.active { color: #fff; border-bottom-color: var(--teal); font-weight: 700; }
.mode-reset {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 1px;
  color: rgba(255,255,255,0.25);
  background: none; border: 1px solid rgba(255,255,255,0.1);
  padding: 4px 10px; cursor: pointer;
  transition: all 0.15s;
}
.mode-reset:hover { color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.3); }

/* ===== PROGRESS ===== */
.progress-rail {
  position: fixed; top: 48px; left: 0; right: 0;
  height: 2px; background: var(--border); z-index: 200;
}
.progress-fill {
  height: 100%; background: var(--teal);
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}
.step-dots {
  position: fixed; top: 62px; right: 20px;
  display: flex; gap: 5px; z-index: 200;
}
.sdot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--border); transition: all 0.25s;
}
.sdot.done { background: var(--teal); }
.sdot.active { background: var(--teal); transform: scale(1.6); }

/* ===== VIEWS ===== */
.view { display: none; min-height: 100vh; padding-top: 48px; }
.view.active { display: block; }

/* ===== SCREENS (within user view) ===== */
.screen { display: none; min-height: calc(100vh - 48px); }
.screen.active { display: flex; flex-direction: column; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
.screen.active { animation: fadeUp 0.35s cubic-bezier(0.4,0,0.2,1); }

/* ===== SHARED ===== */
.wrap  { max-width: 640px; margin: 0 auto; padding: 0 20px; }
.wrap-wide { max-width: 900px; margin: 0 auto; padding: 0 20px; }

.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 13px 24px;
  background: var(--teal); color: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px; font-weight: 700;
  border: none; cursor: pointer;
  transition: all 0.18s; border-radius: 2px;
}
.btn-primary:hover { background: var(--teal-d); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(66,173,159,0.3); }
.btn-primary:disabled { background: var(--light); color: var(--text3); cursor: not-allowed; transform: none; box-shadow: none; }

.btn-outline {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 11px 20px;
  background: none; color: var(--text2);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px; font-weight: 500;
  border: 1px solid var(--border); cursor: pointer;
  transition: all 0.18s; border-radius: 2px;
}
.btn-outline:hover { border-color: var(--teal); color: var(--teal); }

.badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; padding: 2px 8px;
  letter-spacing: 1px; text-transform: uppercase;
}

/* =============================================
   P1: CONTENT PAGE
   ============================================= */
#p1 { background: var(--white); }

.content-nav {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex; align-items: center; gap: 12px;
}
.ceo-avatar-sm {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--navy);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif JP', serif;
  font-size: 14px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.ceo-nav-name { font-size: 13px; font-weight: 700; }
.ceo-nav-co   { font-size: 11px; color: var(--text2); }
.read-progress {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text3);
}

.article-wrap { padding: 32px 20px 120px; max-width: 640px; margin: 0 auto; }

.article-tags {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px;
}
.article-tag {
  font-size: 11px; padding: 3px 10px;
  border: 1px solid var(--teal); color: var(--teal);
  border-radius: 2px;
}
.article-tag.navy { border-color: var(--navy); color: var(--navy); }

.article-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 24px; font-weight: 700;
  line-height: 1.5; margin-bottom: 24px;
  color: var(--navy); letter-spacing: 0.02em;
}

.article-body p {
  color: var(--text2); margin-bottom: 18px;
  font-size: 14px; line-height: 1.9; font-weight: 300;
}
.article-quote {
  border-left: 3px solid var(--teal);
  padding: 14px 18px; margin: 28px 0;
  background: var(--teal-bg);
}
.article-quote p {
  font-family: 'Noto Serif JP', serif;
  font-size: 16px !important; font-weight: 700 !important;
  color: var(--navy) !important; line-height: 1.7 !important;
  margin: 0 !important;
}

.cta-sticky {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  display: flex; align-items: center;
  justify-content: space-between; gap: 16px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}
.cta-sticky-text strong {
  font-size: 13px; font-weight: 700;
  color: var(--navy); display: block; margin-bottom: 2px;
}
.cta-sticky-text span { font-size: 11px; color: var(--text2); }

/* =============================================
   P2: EMPATHY INPUT
   ============================================= */
#p2 { background: var(--bg); }

.empathy-wrap {
  padding: 36px 20px 100px;
  max-width: 600px; margin: 0 auto;
}

.q-progress {
  display: flex; gap: 4px; margin-bottom: 32px;
}
.q-prog-step {
  flex: 1; height: 3px; background: var(--border);
  transition: background 0.3s; border-radius: 2px;
}
.q-prog-step.done   { background: var(--teal); }
.q-prog-step.active { background: var(--teal); opacity: 0.6; }

.q-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 2px;
  color: var(--teal); margin-bottom: 8px;
}
.q-text {
  font-family: 'Noto Serif JP', serif;
  font-size: 19px; font-weight: 700;
  color: var(--navy); line-height: 1.5;
  margin-bottom: 22px;
}
.q-sub { font-size: 12px; color: var(--text2); font-weight: 400; font-family: 'Noto Sans JP', sans-serif; }

.chip-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }

.chip {
  padding: 13px 16px;
  background: var(--white);
  border: 1px solid var(--border);
  cursor: pointer; transition: all 0.18s;
  display: flex; align-items: center; gap: 12px;
  font-size: 13px; color: var(--text2);
  border-radius: 2px;
}
.chip:hover { border-color: var(--teal); color: var(--text); background: var(--teal-bg); }
.chip.selected { border-color: var(--teal); background: var(--teal-bg); color: var(--navy); font-weight: 500; }
.chip-check {
  width: 18px; height: 18px; border-radius: 2px;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: transparent;
  flex-shrink: 0; transition: all 0.18s;
}
.chip.selected .chip-check {
  background: var(--teal); border-color: var(--teal); color: #fff;
}

.free-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.free-input {
  width: 100%; padding: 12px 14px;
  background: var(--white); border: 1px solid var(--border);
  color: var(--text); font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px; resize: none; outline: none;
  transition: border 0.18s; border-radius: 2px;
  line-height: 1.7;
}
.free-input::placeholder { color: var(--text3); }
.free-input:focus { border-color: var(--teal); }

.q-nav {
  display: flex; justify-content: space-between;
  align-items: center; margin-top: 20px;
}

/* =============================================
   P3: AI FEEDBACK
   ============================================= */
#p3 {
  background: var(--navy);
}

.fb-wrap {
  padding: 48px 20px 100px;
  max-width: 600px; margin: 0 auto;
}

.fb-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--teal); margin-bottom: 8px;
}
.fb-heading {
  font-family: 'Noto Serif JP', serif;
  font-size: 14px; color: rgba(255,255,255,0.5);
  margin-bottom: 40px;
}

/* Values */
.values-section { margin-bottom: 36px; }
.values-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.3); margin-bottom: 12px;
}
.value-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.value-tag {
  font-family: 'Noto Serif JP', serif;
  font-size: 17px; font-weight: 700;
  padding: 8px 16px;
  border: 1.5px solid var(--teal);
  color: var(--teal);
  background: rgba(66,173,159,0.1);
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.45s, transform 0.45s;
  border-radius: 2px;
}
.value-tag.show { opacity: 1; transform: translateY(0); }

/* Message */
.msg-block {
  background: rgba(255,255,255,0.05);
  border-left: 3px solid var(--teal);
  padding: 20px; margin-bottom: 24px;
  opacity: 0; transition: opacity 0.5s 0.55s;
  border-radius: 0 2px 2px 0;
}
.msg-block.show { opacity: 1; }
.msg-text {
  font-family: 'Noto Serif JP', serif;
  font-size: 15px; line-height: 1.9;
  color: rgba(255,255,255,0.9);
}

/* Bridge */
.bridge-block {
  padding: 14px 16px;
  background: rgba(66,173,159,0.1);
  border: 1px solid rgba(66,173,159,0.25);
  margin-bottom: 40px;
  opacity: 0; transition: opacity 0.5s 0.85s;
  border-radius: 2px;
}
.bridge-block.show { opacity: 1; }
.bridge-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--teal); margin-bottom: 5px;
}
.bridge-text { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.7; }

/* CTA */
.fb-cta {
  opacity: 0; transition: opacity 0.5s 1.1s;
  text-align: center;
}
.fb-cta.show { opacity: 1; }
.fb-cta-note { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 10px; }

/* Skeleton */
.skel-wrap { margin-bottom: 36px; }
.skel-line {
  height: 12px; border-radius: 2px; margin-bottom: 8px;
  background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
  background-size: 200% 100%;
  animation: shim 1.4s infinite;
}
@keyframes shim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* =============================================
   P4: RECOMMENDATIONS
   ============================================= */
#p4 { background: var(--bg); }

.reco-wrap { padding: 32px 20px 80px; max-width: 700px; margin: 0 auto; }

.reco-heading {
  margin-bottom: 28px;
}
.reco-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--teal); margin-bottom: 6px;
}
.reco-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 22px; font-weight: 700;
  color: var(--navy); margin-bottom: 4px;
}
.reco-sub { font-size: 12px; color: var(--text2); }

/* Original CTA */
.orig-card {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 18px; margin-bottom: 24px;
  background: var(--teal-bg);
  border: 1.5px solid var(--teal);
  cursor: pointer; transition: all 0.18s;
  border-radius: 2px;
}
.orig-card:hover { background: var(--teal-mid); }
.orig-card-body { flex: 1; }
.orig-card-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--teal); margin-bottom: 3px;
}
.orig-card-name { font-size: 14px; font-weight: 700; color: var(--navy); }
.orig-card-action { font-size: 11px; color: var(--text2); margin-top: 2px; }

.reco-cards { display: flex; flex-direction: column; gap: 14px; }

.reco-card {
  background: var(--white);
  border: 1px solid var(--border);
  overflow: hidden; border-radius: 2px;
  animation: fadeUp 0.35s both;
}
.reco-card:nth-child(1){animation-delay:0s}
.reco-card:nth-child(2){animation-delay:0.08s}
.reco-card:nth-child(3){animation-delay:0.16s}

.reco-card-top {
  padding: 18px;
  display: flex; gap: 12px; align-items: flex-start;
  border-bottom: 1px solid var(--border);
}
.reco-av {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif JP', serif;
  font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.reco-meta { flex: 1; }
.reco-name { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 2px; }
.reco-co   { font-size: 11px; color: var(--text2); margin-bottom: 7px; }
.reco-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.reco-tag  {
  font-size: 10px; padding: 2px 7px;
  border: 1px solid var(--border); color: var(--text2);
  border-radius: 2px;
}

.reco-reason {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--navy-bg);
}
.reco-reason-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--navy); opacity: 0.5; margin-bottom: 4px;
}
.reco-reason-text { font-size: 12px; color: var(--text2); line-height: 1.7; }
.reco-reason-text.loading {
  color: transparent; background: var(--light);
  animation: shim 1.4s infinite; border-radius: 2px;
  background-size: 200% 100%;
}

.reco-actions {
  padding: 12px 18px;
  display: flex; gap: 8px;
}

/* =============================================
   P5: CTA COMPLETE
   ============================================= */
#p5 {
  background: var(--navy);
  justify-content: center; align-items: center;
  padding: 60px 20px; text-align: center;
  min-height: calc(100vh - 48px);
}

.complete-icon {
  width: 68px; height: 68px; border-radius: 50%;
  border: 2px solid var(--teal);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: var(--teal);
  margin: 0 auto 24px;
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 0 28px rgba(66,173,159,0.25);
}
@keyframes popIn {
  from { transform:scale(0.4); opacity:0; }
  to   { transform:scale(1);   opacity:1; }
}
.complete-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 24px; font-weight: 700;
  color: #fff; margin-bottom: 10px;
}
.complete-sub {
  font-size: 13px; color: rgba(255,255,255,0.55);
  line-height: 1.9; max-width: 360px;
  margin: 0 auto 32px;
}

.complete-steps {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 20px 24px; max-width: 380px;
  margin: 0 auto 28px; text-align: left;
  border-radius: 2px;
}
.complete-steps-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.3); margin-bottom: 12px;
}
.complete-step {
  display: flex; gap: 10px;
  margin-bottom: 10px; font-size: 13px;
  color: rgba(255,255,255,0.7);
}
.complete-step:last-child { margin-bottom: 0; }
.complete-step-n {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--teal); flex-shrink: 0; padding-top: 2px;
}

/* =============================================
   ADMIN VIEW
   ============================================= */
#admin { background: var(--bg); }

.admin-shell { display: grid; grid-template-columns: 200px 1fr; min-height: calc(100vh - 48px); }

/* Admin sidebar */
.admin-sidebar {
  background: var(--navy);
  padding: 0; display: flex; flex-direction: column;
}
.admin-sidebar-brand {
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.admin-brand-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 14px; font-weight: 700;
  color: #fff; margin-bottom: 2px;
}
.admin-brand-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 2px;
  color: rgba(255,255,255,0.25); text-transform: uppercase;
}

.admin-nav { padding: 12px 0; }
.admin-nav-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.2); padding: 0 16px 6px;
}
.admin-nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px;
  font-size: 12px; color: rgba(255,255,255,0.4);
  cursor: pointer; border-left: 2px solid transparent;
  transition: all 0.15s;
}
.admin-nav-item:hover { color: rgba(255,255,255,0.75); background: rgba(255,255,255,0.04); }
.admin-nav-item.active { color: #fff; border-left-color: var(--teal); background: rgba(66,173,159,0.1); }
.admin-nav-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

.admin-companies { padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.07); }
.admin-co-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; cursor: pointer;
  transition: all 0.15s;
}
.admin-co-item:hover { background: rgba(255,255,255,0.04); }
.admin-co-av {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.admin-co-name { font-size: 11px; color: rgba(255,255,255,0.4); flex: 1; }
.admin-co-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; padding: 1px 5px;
  background: var(--hot); color: #fff; border-radius: 2px;
}

.admin-sidebar-foot {
  margin-top: auto; padding: 14px 16px;
  border-top: 1px solid rgba(255,255,255,0.07);
  font-size: 10px; color: rgba(255,255,255,0.2);
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px;
}

/* Admin main */
.admin-main { display: flex; flex-direction: column; overflow: hidden; }

.admin-topbar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 48px;
  display: flex; align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.admin-topbar-title {
  font-family: 'Noto Serif JP', serif;

    toast(`${c.name}のレポートを生成しました`);
  } catch {
    body.innerHTML=`<strong style="color:var(--teal)">【今月のサマリ】</strong><br>反応${c.reactions}件、CTA${c.cta}件。会いたい率${Math.round(c.cta/c.reactions*100)}%。HOT${c.hot}件が接続待ちです。<br><br><strong style="color:var(--teal)">【どんな人が反応したか】</strong><br>「変革への意志」と「地域への関心」を持つ30〜40代のミドルキャリア層が中心。副業・プロジェクト参画を希望する層が最多でした。<br><br><strong style="color:var(--teal)">【印象的なコメント】</strong><br>「事業承継に関わりたいとずっと思っていました」— 転職意向高<br>「福岡への移住も検討しています」— U/Iターン層<br><br><strong style="color:var(--teal)">【来月への示唆】</strong><br>次回インタビューでは「今一番困っていること」を前面に出す構成を推奨します。`;
  }
}

// ===== UTILS =====
function contactUser(id){
  const r=REACTIONS.find(x=>x.id===id);
  if(r){r.status='contacted';toast(`${r.user} にLINEで連絡しました`);renderAdminTab(S.adminTab);}
}
function toast(msg){
  const t=document.getElementById('toastEl');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
function resetAll(){
  S.q1='';S.q2=[];S.q3='';S.free='';S.fb=null;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));
  const ft=document.getElementById('freeText'); if(ft) ft.value='';
  const sb=document.getElementById('submitBtn'); if(sb) sb.disabled=true;
  const q2n=document.getElementById('q2next'); if(q2n) q2n.disabled=true;
  ['q1b'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='block';});
  ['q2b','q3b'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  ['msgBlock','bridgeBlock','fbCta'].forEach(id=>{document.getElementById(id)?.classList.remove('show');});
  document.querySelectorAll('.value-tag').forEach(t=>t.classList.remove('show'));
  const fs=document.getElementById('fbSkel');if(fs)fs.style.display='block';
  const fc=document.getElementById('fbContent');if(fc)fc.style.display='none';
  const rc=document.getElementById('recoCards');if(rc)rc.innerHTML='';
  goScreen('p1');
  document.querySelector('.mode-btn').click();
}

// init admin
renderAdminTab("dash");

function checkPass() {
  const pass = document.getElementById('passInput').value;
  if(pass === 'soconara2024') {
    document.getElementById('passGate').style.display='none';
    localStorage.setItem('soconara_admin','ok');
  } else {
    document.getElementById('passErr').style.display='block';
    document.getElementById('passInput').value='';
  }
}
// Auto-check if already logged in
if(localStorage.getItem('soconara_admin')==='ok'){
  document.addEventListener('DOMContentLoaded',()=>{
    const g=document.getElementById('passGate');if(g)g.style.display='none';
  });
}

</script>
