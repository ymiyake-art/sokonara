<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ソコナラ 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#42AD9F; --teal-d:#2e8c7f; --teal-bg:rgba(66,173,159,0.08);
  --navy:#1C2A54; --gray:#716C6B; --light:#E4E3E3;
  --white:#ffffff; --bg:#F5F5F5; --text:#1a1a1a;
  --text2:#716C6B; --text3:#aaa8a7; --border:#E4E3E3;
  --hot:#c0341a; --hot-bg:rgba(192,52,26,0.07);
  --warm:#b07818; --warm-bg:rgba(176,120,24,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;line-height:1.6;-webkit-font-smoothing:antialiased;}

#gate{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9999;}
#gate-box{text-align:center;}
#gate-title{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:24px;}
#gate-title span{color:var(--teal);}
#gate-input{display:block;width:260px;padding:12px 16px;font-size:14px;font-family:'Noto Sans JP',sans-serif;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.1);color:#fff;outline:none;border-radius:2px;margin:0 auto 12px;}
#gate-input::placeholder{color:rgba(255,255,255,0.4);}
#gate-btn{width:260px;padding:12px;background:var(--teal);color:#fff;border:none;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;border-radius:2px;}
#gate-btn:hover{background:var(--teal-d);}
#gate-err{color:rgba(255,120,120,0.9);font-size:12px;margin-top:10px;display:none;}

#topbar{position:fixed;top:0;left:0;right:0;height:48px;background:var(--navy);display:none;align-items:center;padding:0 20px;gap:16px;z-index:100;}
#topbar-brand{display:flex;align-items:center;}
#topbar-brand img{height:32px;width:auto;display:block;}
#topbar-sub{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.3);}
#logout-btn{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 10px;color:rgba(255,255,255,0.3);background:none;border:1px solid rgba(255,255,255,0.1);cursor:pointer;border-radius:2px;}
#logout-btn:hover{color:rgba(255,255,255,0.7);}

#shell{display:none;padding-top:48px;min-height:100vh;}
.admin-shell{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 48px);}

.admin-sidebar{background:var(--navy);display:flex;flex-direction:column;}
.admin-sidebar-brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.07);}
.admin-brand-title{margin-bottom:4px;display:flex;align-items:center;}
.admin-brand-title img{height:24px;width:auto;display:block;}
.admin-brand-sub{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,0.25);text-transform:uppercase;}
.admin-nav{padding:12px 0;}
.admin-nav-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);padding:0 16px 6px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:12px;color:rgba(255,255,255,0.4);cursor:pointer;border-left:2px solid transparent;transition:all 0.15s;}
.nav-item:hover{color:rgba(255,255,255,0.75);background:rgba(255,255,255,0.04);}
.nav-item.active{color:#fff;border-left-color:var(--teal);background:rgba(66,173,159,0.1);}
.nav-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.nav-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--hot);color:#fff;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;margin-left:auto;line-height:1;flex-shrink:0;}
.nav-badge[data-count="0"],.nav-badge:empty{display:none;}
.co-items{padding:12px 0;border-top:1px solid rgba(255,255,255,0.07);}
.co-item{display:flex;align-items:center;gap:8px;padding:7px 16px;}
.co-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;}
.co-nm{font-size:11px;color:rgba(255,255,255,0.4);flex:1;}
.co-bd{font-family:'JetBrains Mono',monospace;font-size:8px;padding:1px 5px;background:var(--hot);color:#fff;border-radius:2px;}
.sidebar-foot{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(255,255,255,0.07);font-size:10px;color:rgba(255,255,255,0.2);font-family:'JetBrains Mono',monospace;}

.admin-main{display:flex;flex-direction:column;}
.admin-tpbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:48px;display:flex;align-items:center;justify-content:space-between;}
.admin-tpbar-title{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:700;color:var(--navy);}
.admin-tpbar-right{display:flex;gap:8px;}
.abtn{font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:700;padding:5px 14px;cursor:pointer;border-radius:2px;transition:all 0.15s;}
.abtn-teal{background:var(--teal);color:#fff;border:none;}
.abtn-teal:hover{background:var(--teal-d);}
.abtn-ghost{background:none;color:var(--text2);border:1px solid var(--border);}
.abtn-ghost:hover{border-color:var(--teal);color:var(--teal);}
#adminContent{padding:24px;flex:1;}

.panel{background:var(--white);border:1px solid var(--border);border-radius:2px;overflow:hidden;margin-bottom:16px;}
.phdr{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:var(--navy);}
.pbody{padding:16px;}
.pflush{padding:0;}

.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.kpi{background:var(--white);border:1px solid var(--border);padding:14px 16px;border-radius:2px;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.kt::after{background:var(--teal);}
.kpi.kn::after{background:var(--navy);}
.kpi.kh::after{background:var(--hot);}
.kpi.kw::after{background:var(--warm);}
.kpi.kg::after{background:var(--gray);}
.kpi-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:7px;}
.kpi-v{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:900;line-height:1;margin-bottom:4px;}
.kpi-d{font-size:10px;color:var(--teal);}
.kpi-d.neu{color:var(--text3);}

.funnel{display:grid;grid-template-columns:repeat(5,1fr);border:1px solid var(--border);margin-bottom:20px;border-radius:2px;overflow:hidden;}
.fs{padding:12px 14px;border-right:1px solid var(--border);background:var(--white);position:relative;overflow:hidden;}
.fs:last-child{border-right:none;}
.fsv{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.fsn{font-size:11px;font-weight:500;margin-bottom:2px;}
.fsr{font-size:10px;color:var(--teal);font-family:'JetBrains Mono',monospace;}
.fsb{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--teal);}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

.rtable{width:100%;border-collapse:collapse;}
.rtable th{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);text-align:left;padding:7px 12px;background:var(--bg);border-bottom:1px solid var(--border);}
.rtable td{padding:9px 12px;border-bottom:1px solid rgba(228,227,227,0.5);font-size:12px;vertical-align:middle;}
.rtable tr:last-child td{border-bottom:none;}
.rtable tr:hover td{background:var(--bg);}
.tc{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:2px 7px;display:inline-block;border-radius:2px;}
.tch{background:var(--hot-bg);color:var(--hot);border:1px solid rgba(192,52,26,0.2);}
.tcw{background:var(--warm-bg);color:var(--warm);border:1px solid rgba(176,120,24,0.2);}
.tcc{background:rgba(28,42,84,0.06);color:var(--navy);border:1px solid rgba(28,42,84,0.15);}
.sc{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 7px;border-radius:2px;}
.scp{background:rgba(192,52,26,0.08);color:var(--hot);}
.scc{background:rgba(176,120,24,0.08);color:var(--warm);}
.scd{background:var(--teal-bg);color:var(--teal-d);}
.actbtn{font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 9px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text2);border-radius:2px;transition:all 0.15s;}
.actbtn:hover{border-color:var(--teal);color:var(--teal);}
.actbtn.pr{background:var(--teal);color:#fff;border-color:var(--teal);}

.barchart{display:flex;flex-direction:column;gap:7px;}
.barrow{display:flex;align-items:center;gap:8px;}
.barlbl{font-size:11px;color:var(--text2);width:160px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bartrack{flex:1;height:12px;background:var(--bg);position:relative;overflow:hidden;border-radius:1px;}
.barfill{height:100%;background:var(--teal);position:absolute;left:0;top:0;transition:width 1s;border-radius:1px;}
.barcnt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);width:24px;text-align:right;}

.ai-blk{background:var(--navy);color:rgba(255,255,255,0.8);padding:18px;margin-bottom:16px;border-radius:2px;}
.ai-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.ai-tg{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;padding:3px 8px;background:var(--teal);color:#fff;border-radius:2px;}
.ai-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,0.3);}
.ai-txt{font-size:13px;line-height:1.8;margin-bottom:10px;}
.ai-btn{font-family:'JetBrains Mono',monospace;font-size:8px;padding:4px 11px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.4);cursor:pointer;border-radius:2px;transition:all 0.15s;}
.ai-btn:hover{background:rgba(66,173,159,0.2);border-color:var(--teal);color:#fff;}
.ai-load{opacity:0.4;animation:shim 1.4s infinite;height:52px;border-radius:2px;background-size:200% 100%;background-image:linear-gradient(90deg,rgba(255,255,255,0.05) 25%,rgba(255,255,255,0.12) 50%,rgba(255,255,255,0.05) 75%);}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

.tl{display:flex;flex-direction:column;}
.tlrow{display:grid;grid-template-columns:60px 1fr;gap:10px;padding:9px 0;border-bottom:1px solid rgba(228,227,227,0.4);align-items:start;}
.tlrow:last-child{border-bottom:none;}
.tltime{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);padding-top:2px;}
.tlname{font-size:12px;font-weight:500;color:var(--navy);margin-bottom:1px;}
.tldtl{font-size:11px;color:var(--text2);}
.tldot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;}

.ms{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(228,227,227,0.4);}
.ms:last-child{border-bottom:none;}
.mslbl{font-size:12px;color:var(--text2);flex:1;}
.msbar{width:72px;height:4px;background:var(--bg);position:relative;overflow:hidden;border-radius:2px;}
.msfill{position:absolute;left:0;top:0;height:100%;border-radius:2px;transition:width 1s;}
.msval{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:700;color:var(--navy);}

.cogrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.cocard{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--border);cursor:pointer;background:var(--white);transition:all 0.15s;border-radius:2px;}
.cocard:hover{border-color:var(--teal);}
.coav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.conm{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.comt{font-size:11px;color:var(--text2);}
.coarr{margin-left:auto;font-size:14px;color:var(--teal);}

.rpt-out{background:var(--navy);color:rgba(255,255,255,0.8);padding:20px;margin-top:16px;border-radius:2px;}
.rpt-body{font-size:13px;line-height:1.9;}
.rpt-acts{display:flex;gap:8px;margin-top:14px;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--navy);color:#fff;padding:10px 20px;font-size:12px;z-index:999;border-radius:2px;transition:transform 0.3s;box-shadow:0 4px 16px rgba(28,42,84,0.3);}
.toast.show{transform:translateX(-50%) translateY(0);}
.uini{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;}

@media(max-width:768px){
  .admin-shell{grid-template-columns:200px 1fr;}
  .admin-sidebar{display:flex;}
  .kpi-row{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr;}
  .funnel{grid-template-columns:1fr;}
  .cogrid{grid-template-columns:1fr;}
}
</style>
</head>

        <div class="nav-item" id="ni-cards" onclick="switchTab('cards')"><div class="nav-dot" style="background:#9b59b6"></div>🗂️ 課題カード(v2)</div>
        <div class="nav-item" id="ni-utmlinks" onclick="switchTab('utmlinks')"><div class="nav-dot" style="background:#16a085"></div>🔗 配信リンク・UTM</div>
        <div class="nav-item" id="ni-cases" onclick="switchTab('cases')"><div class="nav-dot" style="background:#e74c3c"></div>✨ 出会いの実例(LP)</div>
      </div>
      <div class="admin-nav" style="border-top:1px solid rgba(255,255,255,0.07);padding-top:12px;">
        <div class="admin-nav-label">リファレンス</div>
        <div class="nav-item" id="ni-philosophy" onclick="switchTab('philosophy')"><div class="nav-dot" style="background:var(--teal)"></div>🧭 設計思想</div>
      </div>
      <div class="admin-nav" style="border-top:1px solid rgba(255,255,255,0.07);padding-top:12px;">
        <div class="admin-nav-label">公開ページ</div>
        <a class="nav-item" href="/" target="_blank" rel="noopener" style="text-decoration:none;"><div class="nav-dot" style="background:#9b59b6"></div>📱 アプリTOP ↗</a>

      <div class="co-items" id="sidebarCompanies"></div>
      <div style="margin-top:auto;padding:14px 16px;border-top:1px solid rgba(255,255,255,0.07)">
        <a href="/" style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(255,255,255,0.07);border-radius:4px;color:rgba(255,255,255,0.6);font-size:12px;text-decoration:none;transition:background .15s" onmouseover="this.style.background='rgba(255,255,255,0.13)'" onmouseout="this.style.background='rgba(255,255,255,0.07)'">

    </aside>
    <div class="admin-main">
      <div class="admin-tpbar">

        <div class="admin-tpbar-right">
          <button class="abtn abtn-ghost" onclick="toast('CSVを出力しました')">↓ CSV</button>
          <button class="abtn abtn-teal" onclick="switchTab('report')">✦ AIレポート</button>
        </div>
      </div>
      <div id="adminContent"></div>
    </div>
  </div>
</div>

      document.getElementById('gate-input').focus();
    }
  } catch(e) {

// 選んだ経営層の記事から、課題カード(1行目/2行目/タグ)をAI自動生成
async function genCardFromArticle(){
  const id=document.getElementById('f-co').value;
  const co=loadCompanies().find(c=>String(c.id)===String(id));
  if(!co){ toast('先に経営層を選択してください'); return; }
  // 記事本文を抽出
  let articleText='';
  try{
    const b=co.body||'';
    if(String(b).trimStart().startsWith('[')){
      const secs=JSON.parse(b);
      articleText=secs.map(s=>[s.heading,s.body,(s.items||[]).map(i=>(i.q||'')+' '+(i.a||'')).join(' ')].filter(Boolean).join('\n')).join('\n\n');
    } else { articleText=String(b); }
  }catch(e){ articleText=String(co.body||''); }
  if(!articleText.trim()){ toast('この経営層には記事本文がありません'); return; }
  const btn=document.getElementById('f-gencard-btn'); if(btn){ btn.disabled=true; btn.textContent='生成中…'; }
  try{
    const res=await fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'cardgen',data:{ceo:co.ceo||'',company:co.name||co.company||'',articleText}})});
    if(!res.ok) throw new Error('API '+res.status);
    const d=await res.json(); const txt=d.content?.[0]?.text||''; const m=txt.match(/\{[\s\S]*\}/);
    const p=JSON.parse(m?m[0]:txt);
    if(p.card_title) document.getElementById('f-title').value=p.card_title;
    if(p.card_sub) document.getElementById('f-sub').value=p.card_sub;
    document.getElementById('f-company').value=co.name||co.company||'';
    document.getElementById('f-leader').value=co.ceo||'';
    // タグのチェックを反映
    if(Array.isArray(p.btags)) document.querySelectorAll('.cb-bt').forEach(cb=>{ cb.checked=p.btags.includes(cb.value); });
    if(Array.isArray(p.rtags)) document.querySelectorAll('.cb-rt').forEach(cb=>{ cb.checked=p.rtags.includes(cb.value); });
    // IDは自動発行（新規作成時、未入力なら埋める）
    const idEl=document.getElementById('f-id'); if(idEl && !idEl.disabled && !idEl.value.trim()){ idEl.value=genCardId(); }
    toast('AIで生成しました（必要に応じて手直しを）');
  }catch(e){ toast('生成失敗: '+(e.message||e)); }
  finally{ if(btn){ btn.disabled=false; btn.textContent='✨ 記事から自動生成'; } }
}

async function cardSave(editId){

    id,
    card_title:document.getElementById('f-title').value.trim(),

// 管理画面の書き込みは service_role API 経由（anon書込はDB側で禁止）
async function adminWrite(table, action, body){
  try{
    const res=await fetch('/api/admin-data',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:_adminPw, table, action, ...body})});
    const d=await res.json().catch(()=>({}));
    return { ok:res.ok && d.ok!==false, status:res.status, error:d.error };
  }catch(e){ return { ok:false, error:String(e&&e.message||e) }; }
}

  const cos=loadCompanies();
  const coName=id=>{ const c=cos.find(x=>String(x.id)===String(id)); return c?(c.name||c.company||id):(id||'不明'); };
  const coCeo =id=>{ const c=cos.find(x=>String(x.id)===String(id)); return c?(c.ceo||''):''; };
  const pct=(n,d)=>d?Math.round(n/d*100):0;

  // 期間フィルタ（started_at優先。未パース行は期間指定時に除外して件数を正確に）
  if(_resFrom || _resTo){
    const fromT=_resFrom?new Date(_resFrom+'T00:00:00').getTime():-Infinity;
    const toT=_resTo?new Date(_resTo+'T23:59:59').getTime():Infinity;
    logs=logs.filter(l=>{ const ts=Date.parse(l.started_at||l.created_at||l.updated_at||''); return isNaN(ts)?false:(ts>=fromT && ts<=toT); });
  }
  // 全体ファネル（行はカード開始時に作成されるため N=カード開始数）
  const N=logs.length;
  const swiped=l=>((l.picked_cards||[]).length+(l.dropped_cards||[]).length);
  const f3=logs.filter(l=>swiped(l)>=3).length;
  // 到達：reached_result。旧データ(列なし)は top_tags 有無で後方互換判定
  const fResult=logs.filter(l=>l.reached_result || (l.top_tags&&l.top_tags.length)).length;
  const fRead=logs.filter(l=>l.article_read).length;
  const fAi=logs.filter(l=>l.ai_viewed).length;
  const fLine=logs.filter(l=>l.line_registered).length;
  const fCta=logs.filter(l=>l.contact_cta).length;
  const fForm=logs.filter(l=>l.form_open).length;

  // チャネル別（utm_source）— LINE配信 vs メール等の効果比較
  const chName=s=>s?String(s):'直接/不明';
  const byCh={};
  logs.forEach(l=>{ const k=chName(l.utm_source); (byCh[k]=byCh[k]||[]).push(l); });
  const chRows=Object.entries(byCh).sort((a,b)=>b[1].length-a[1].length);
  const chTable=chRows.map(([ch,arr])=>{
    const n=arr.length;
    const a=arr.filter(l=>l.article_read).length;
    const ai=arr.filter(l=>l.ai_viewed).length;
    const cta=arr.filter(l=>l.contact_cta).length;
    const camp=(arr.find(l=>l.utm_campaign)||{}).utm_campaign||'';
    const contents=[...new Set(arr.map(l=>l.utm_content).filter(Boolean))];
    const sub=[camp, contents.length?('content: '+contents.join(' / ')):''].filter(Boolean).join(' ／ ');
    return `<tr>
      <td style="padding:8px 10px;border-bottom:1px solid var(--border);font-weight:700;color:var(--navy)">${escA(ch)}${sub?`<div style="font-weight:400;font-size:10px;color:var(--text3)">${escA(sub)}</div>`:''}</td>
      <td style="padding:8px 10px;border-bottom:1px solid var(--border);text-align:right">${n}</td>
      <td style="padding:8px 10px;border-bottom:1px solid var(--border);text-align:right">${a} <span style="color:var(--text3)">(${pct(a,n)}%)</span></td>
      <td style="padding:8px 10px;border-bottom:1px solid var(--border);text-align:right">${ai} <span style="color:var(--text3)">(${pct(ai,n)}%)</span></td>
      <td style="padding:8px 10px;border-bottom:1px solid var(--border);text-align:right;font-weight:700;color:#2e8c7f">${cta} <span style="color:var(--text3);font-weight:400">(${pct(cta,n)}%)</span></td>
    </tr>`;
  }).join('');

  // 版別（人物=person / 課題=challenge / 旧=不明）A/B比較
  const vLabel={person:'人物(偶然性)',challenge:'課題',moya:'モヤモヤ(逆引き)',_:'（旧/不明）'};
  const byVar={};
  logs.forEach(l=>{ const k=(l.variant==='person'||l.variant==='challenge'||l.variant==='moya')?l.variant:'_'; (byVar[k]=byVar[k]||[]).push(l); });
  const varTable=['person','challenge','moya','_'].filter(k=>byVar[k]).map(k=>{
    const arr=byVar[k], n=arr.length;
    const sel=arr.filter(l=>l.reached_result||(l.top_tags&&l.top_tags.length)).length;
    const a=arr.filter(l=>l.article_read).length;
    const cta=arr.filter(l=>l.contact_cta).length;
    const ai=arr.filter(l=>l.ai_viewed).length;
    const cell=(v,p,bold)=>`<td style="padding:8px 10px;border-bottom:1px solid var(--border);text-align:right;${bold?'font-weight:700;color:#2e8c7f':''}">${v}${p!=null?` <span style="color:var(--text3);font-weight:400">(${p}%)</span>`:''}</td>`;
    return `<tr><td style="padding:8px 10px;border-bottom:1px solid var(--border);font-weight:700;color:var(--navy)">${vLabel[k]}</td>${cell(n,null)}${cell(sel,pct(sel,n))}${cell(a,pct(a,n))}${cell(cta,pct(cta,n),true)}${cell(ai,pct(ai,n))}</tr>`;
  }).join('');

  // カード文言アーム勝率（カード1枚ごとにアーム割当→対決の勝敗を集計＝CVより早く大量に貯まる）。
  const aLabel={what:'What（事業）',value:'Why+Who（価値観）',life:'Life（転機）'};
  const armShown={what:0,value:0,life:0}, armWon={what:0,value:0,life:0};
  logs.forEach(l=>{ const ev=l.arm_events; if(Array.isArray(ev)) ev.forEach(e=>{ if(e&&armShown.hasOwnProperty(e.w)){armShown[e.w]++;armWon[e.w]++;} if(e&&armShown.hasOwnProperty(e.l)){armShown[e.l]++;} }); });
  const armTable=['what','value','life'].filter(k=>armShown[k]>0).map(k=>{
    const sh=armShown[k], wn=armWon[k];
    const cell=(v,bold)=>`<td style="padding:8px 10px;border-bottom:1px solid var(--border);text-align:right;${bold?'font-weight:700;color:#2e8c7f':''}">${v}</td>`;
    return `<tr><td style="padding:8px 10px;border-bottom:1px solid var(--border);font-weight:700;color:var(--navy)">${aLabel[k]}</td>${cell(sh)}${cell(wn)}${cell(pct(wn,sh)+'%',true)}</tr>`;
  }).join('');

  // 集計ヘルパー
  const tally=(arr)=>{ const m={}; arr.forEach(v=>{ if(v) m[v]=(m[v]||0)+1; }); return Object.entries(m).sort((a,b)=>b[1]-a[1]); };
  const bLabel=t=>CARD_BTAGS[t]||t, rLabel=t=>CARD_RTAGS[t]||t;

  // 全体のタグ・共鳴分布
  const allTop=[],allR=[];
  logs.forEach(l=>{ (l.top_tags||[]).forEach(t=>allTop.push(t)); (l.rtags_hit||[]).forEach(t=>allR.push(t)); });

  // 経営層別
  const byCo={};
  logs.forEach(l=>{ const k=l.recommended_company||'不明'; (byCo[k]=byCo[k]||[]).push(l); });
  const coRows=Object.entries(byCo).sort((a,b)=>b[1].length-a[1].length);

  const chipRow=(entries,labeler,color)=>entries.slice(0,6).map(([t,n])=>
    `<span style="display:inline-block;background:${color}1a;color:${color};font-size:11px;padding:3px 9px;border-radius:11px;margin:0 5px 5px 0;">${escA(labeler(t))} <b>${n}</b></span>`).join('')||'<span style="color:var(--text3);font-size:12px">—</span>';

  const funnelBar=(n)=>`<div style="flex:1;background:var(--border);height:8px;border-radius:5px;overflow:hidden;"><div style="height:100%;width:${pct(n,N)}%;background:#8e44ad;border-radius:5px;"></div></div>`;

  box.innerHTML=`
  <div style="padding:24px;max-width:980px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:18px;">
      <div style="font-size:13px;color:var(--text2);line-height:1.7">
        経営者マッチを開始した匿名セッション <b>${N}</b>件（開始時に記録／途中離脱も含む）。<br>
        新導線（経営者を選ぶ→記事→面談）の到達と、診断/LINE特典の件数を集計。版別（人物/課題）の比較も。個人情報は含みません。
      </div>
      ${N? `<button onclick="cardLogDeleteAll()" style="flex:0 0 auto;padding:8px 14px;background:none;border:1px solid var(--hot);color:var(--hot);border-radius:4px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;">全セッション消去</button>`:''}
    </div>

    <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <span style="font-size:12px;font-weight:700;color:var(--navy);margin-right:4px;">📅 期間</span>
      <button onclick="resPreset(null)" style="font-size:11px;padding:5px 12px;border:1px solid ${(!_resFrom&&!_resTo)?'#2e8c7f':'var(--border)'};background:${(!_resFrom&&!_resTo)?'rgba(66,173,159,.1)':'#fff'};border-radius:20px;cursor:pointer;font-family:inherit;">全期間</button>
      <button onclick="resPreset(0)" style="font-size:11px;padding:5px 12px;border:1px solid var(--border);background:#fff;border-radius:20px;cursor:pointer;font-family:inherit;">今日</button>
      <button onclick="resPreset(7)" style="font-size:11px;padding:5px 12px;border:1px solid var(--border);background:#fff;border-radius:20px;cursor:pointer;font-family:inherit;">7日</button>
      <button onclick="resPreset(30)" style="font-size:11px;padding:5px 12px;border:1px solid var(--border);background:#fff;border-radius:20px;cursor:pointer;font-family:inherit;">30日</button>
      <input type="date" value="${_resFrom}" onchange="resSetFrom(this.value)" style="font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-family:inherit;">
      <span style="color:var(--text3);font-size:12px;">〜</span>
      <input type="date" value="${_resTo}" onchange="resSetTo(this.value)" style="font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-family:inherit;">
      <span style="font-size:11px;color:var(--text3);margin-left:auto;">${(_resFrom||_resTo)?('該当 <b>'+N+'</b>件'):('全 <b>'+N+'</b>件')}</span>
    </div>

    <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px;">
      <div style="font-weight:700;font-size:13px;margin-bottom:14px;">新導線ファネル <span style="font-weight:400;color:var(--text3);font-size:11px">（開始を100%とした到達率／フォームを開く＝メインCV）</span></div>
      ${[['カード開始',N],['経営者を選んだ',fResult],['記事を読んだ',fRead],['興味（共感→P5）',fCta],['フォームを開いた（CV）',fForm]].map(([lbl,n],i,arr)=>
        `<div style="display:flex;align-items:center;gap:12px;margin-bottom:9px;font-size:12px;">
          <div style="width:160px;color:${i===arr.length-1?'#2e8c7f':'var(--text2)'};font-weight:${i===arr.length-1?'700':'400'}">${lbl}</div>
          ${funnelBar(n)}
          <div style="width:70px;text-align:right"><b>${n}</b> <span style="color:var(--text3)">(${pct(n,N)}%)</span></div>
        </div>`).join('')}
    </div>

    <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px;">
      <div style="font-weight:700;font-size:13px;margin-bottom:4px;">補助指標（LINE特典・先方フィードバック用）</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px;">診断(AIレポート)とLINE登録は新導線では任意（メインCVはフォームを開く）。経営層への報告用に件数を継続取得します。</div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;">
        ${[['AI診断(レポート)を見た',fAi],['LINE登録',fLine],['3枚以上スワイプ ※課題版',f3]].map(([lbl,n])=>
          `<div style="flex:1;min-width:150px;background:var(--bg);border-radius:8px;padding:12px 14px;">
            <div style="font-size:11px;color:var(--text2);margin-bottom:4px;">${lbl}</div>
            <div style="font-size:20px;font-weight:700;color:var(--navy)">${n} <span style="font-size:12px;color:var(--text3);font-weight:400">(${pct(n,N)}%)</span></div>
          </div>`).join('')}
      </div>
    </div>

    <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px;">
      <div style="font-weight:700;font-size:13px;margin-bottom:4px;">版別 A/B（人物 vs 課題）</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px;">?v=person（人物・偶然性／既定）と ?v=challenge（課題）の比較。興味（共感）到達率が勝ち筋判定（フォーム開封はメインファネル参照）。</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead><tr>
          ${['版','開始','選択','記事','興味','AI診断'].map((h,i)=>`<th style="text-align:${i?'right':'left'};padding:8px 10px;font-size:10px;letter-spacing:1px;color:var(--text3);font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border)">${h}</th>`).join('')}
        </tr></thead>
        <tbody>${varTable||`<tr><td colspan="6" style="padding:14px;text-align:center;color:var(--text3)">データがありません</td></tr>`}</tbody>
      </table>
    </div>

    <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px;">
      <div style="font-weight:700;font-size:13px;margin-bottom:4px;">カード文言A/B 勝率（What / Why+Who / Life）</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px;">カード1枚ごとにアームをランダム表示し、対決で「選ばれた回数／表示回数」で勝率を集計（CVより早く貯まる）。勝率が高い惹かれ方が有力。文言は各企業編集の「カードA/B文言」で変更可。</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead><tr>
          ${['アーム','表示回数','選ばれた','勝率'].map((h,i)=>`<th style="text-align:${i?'right':'left'};padding:8px 10px;font-size:10px;letter-spacing:1px;color:var(--text3);font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border)">${h}</th>`).join('')}
        </tr></thead>
        <tbody>${armTable||`<tr><td colspan="4" style="padding:14px;text-align:center;color:var(--text3)">データがありません</td></tr>`}</tbody>
      </table>
    </div>

    <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px;">
      <div style="font-weight:700;font-size:13px;margin-bottom:4px;">チャネル別（流入元 utm_source）</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px;">LINE配信／メール等の効果比較。%は各チャネルの「カード開始」を基準にした到達率。興味(右端＝共感)まで見るのが勝ち筋判定（フォーム開封はメインファネル参照）。</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead><tr>
          <th style="text-align:left;padding:8px 10px;font-size:10px;letter-spacing:1px;color:var(--text3);font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border)">チャネル</th>
          <th style="text-align:right;padding:8px 10px;font-size:10px;letter-spacing:1px;color:var(--text3);font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border)">開始</th>
          <th style="text-align:right;padding:8px 10px;font-size:10px;letter-spacing:1px;color:var(--text3);font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border)">記事閲覧</th>
          <th style="text-align:right;padding:8px 10px;font-size:10px;letter-spacing:1px;color:var(--text3);font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border)">AI診断</th>
          <th style="text-align:right;padding:8px 10px;font-size:10px;letter-spacing:1px;color:var(--text3);font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border)">興味</th>
        </tr></thead>
        <tbody>${chTable||`<tr><td colspan="5" style="padding:14px;text-align:center;color:var(--text3)">データがありません</td></tr>`}</tbody>

    </div>

    <div class="two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px;">
      <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;">
        <div style="font-weight:700;font-size:13px;margin-bottom:10px;">惹かれた課題テーマ（全体）</div>
        <div>${chipRow(tally(allTop),bLabel,'#2e8c7f')}</div>
      </div>
      <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;">
        <div style="font-weight:700;font-size:13px;margin-bottom:10px;">共鳴タイプ（全体）</div>
        <div>${chipRow(tally(allR),rLabel,'#E2725B')}</div>
      </div>
    </div>

    <div style="font-weight:700;font-size:14px;margin-bottom:12px;">経営層別の共鳴</div>
    ${coRows.map(([cid,arr])=>{
      const top=[],rt=[],q1=[],chips=[];
      arr.forEach(l=>{ (l.top_tags||[]).forEach(t=>top.push(t)); (l.rtags_hit||[]).forEach(t=>rt.push(t)); if(l.q1_phrase)q1.push(l.q1_phrase); (l.memo_chips||[]).forEach(c=>chips.push(c)); });
      const cta=arr.filter(l=>l.contact_cta).length, ai=arr.filter(l=>l.ai_viewed).length;
      const q1t=tally(q1).slice(0,3);
      return `<div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;">

          <div style="font-size:12px;color:var(--text2)">${arr.length}件 ／ AI ${ai} ／ 面談 <b style="color:#8e44ad">${cta}</b></div>
        </div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px;">惹かれた課題</div>
        <div style="margin-bottom:8px;">${chipRow(tally(top),bLabel,'#2e8c7f')}</div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px;">共鳴タイプ</div>
        <div style="margin-bottom:8px;">${chipRow(tally(rt),rLabel,'#E2725B')}</div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px;">反応した「刺さった言葉」TOP3</div>
        <div style="font-size:12px;color:var(--text);line-height:1.7;margin-bottom:8px;">${q1t.length?q1t.map(([p,n])=>`・${escA(p)} <span style="color:var(--text3)">(${n})</span>`).join('<br>'):'<span style="color:var(--text3)">—</span>'}</div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px;">仮想転職で「できそう」と選んだこと</div>
        <div>${chipRow(tally(chips),x=>x,'#2980b9')}</div>
      </div>`;
    }).join('')||'<div style="color:var(--text3)">まだデータがありません。</div>'}

    ${(function(){
      // ===== カード別パフォーマンス =====
      const cs={}; const E=id=>cs[id]||(cs[id]={shown:0,picked:0,reco:0,read:0,ai:0,cta:0});
      logs.forEach(l=>{
        const p=new Set(l.picked_cards||[]);
        new Set([...(l.picked_cards||[]),...(l.dropped_cards||[])]).forEach(id=>{ const s=E(id); s.shown++; if(p.has(id))s.picked++; });
        if(l.recommended_card){ const s=E(l.recommended_card); s.reco++; if(l.article_read)s.read++; if(l.ai_viewed)s.ai++; if(l.contact_cta)s.cta++; }
      });
      const rows=Object.entries(cs).sort((a,b)=>b[1].shown-a[1].shown);
      if(!rows.length) return '';
      return `<div style="font-weight:700;font-size:14px;margin:24px 0 12px;">カード別パフォーマンス</div>
      <div style="background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;">
        <div style="display:flex;font-size:10px;color:var(--text3);padding:8px 12px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;">
          <div style="flex:1">カード</div><div style="width:46px;text-align:right">表示</div><div style="width:54px;text-align:right">興味率</div><div style="width:42px;text-align:right">推薦</div><div style="width:42px;text-align:right">記事</div><div style="width:36px;text-align:right">AI</div><div style="width:42px;text-align:right">面談</div>
        </div>
        ${rows.map(([id,s])=>{
          const info=cardTitle[id]||{}; const t=info.t||id;
          return `<div style="display:flex;align-items:center;font-size:11.5px;padding:9px 12px;border-bottom:1px solid var(--border);">
            <div style="flex:1;color:var(--text);line-height:1.4;padding-right:8px;">${escA(t)}<br><span style="font-size:10px;color:var(--text3)">${escA(info.co||'')}</span></div>
            <div style="width:46px;text-align:right">${s.shown}</div>
            <div style="width:54px;text-align:right;font-weight:700;color:#2e8c7f">${pct(s.picked,s.shown)}%</div>
            <div style="width:42px;text-align:right">${s.reco}</div>

async function deleteInterestRow(id, btn){
  if(!id) return;
  if(!confirm('このエントリを削除しますか？\n（この操作は取り消せません）')) return;
  btn.disabled = true;
  btn.textContent = '削除中...';
  try {
    const res = await fetch('/api/interest-forms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: _adminPw, action: 'delete', id })
    });
    const data = await res.json();
    if(data.ok || res.ok){
      const row = document.getElementById('irow-' + id);
      if(row){ row.style.transition='opacity .3s'; row.style.opacity='0'; setTimeout(()=>row.remove(), 300); }
      _interestRows = _interestRows.filter(r => String(r.id) !== String(id));
      toast('削除しました');
    } else {
      btn.disabled = false; btn.textContent = '🗑 削除';
      toast('削除に失敗しました');
    }
  } catch(e){
    btn.disabled = false; btn.textContent = '🗑 削除';
    toast('エラーが発生しました');
  }
}

function updateInterestSelCount(){
  const checks = [...document.querySelectorAll('.ig-check')];
  const sel = checks.filter(c=>c.checked).length;
  const btn = document.getElementById('ig-delsel');
  if(btn){ btn.textContent = `🗑 選択削除（${sel}）`; btn.disabled = sel===0; btn.style.opacity = sel===0 ? '0.5' : '1'; }
  const all = document.getElementById('ig-selall');
  if(all){ all.checked = checks.length>0 && sel===checks.length; }
}
function toggleInterestSelectAll(cb){
  document.querySelectorAll('.ig-check').forEach(c=>{ c.checked = cb.checked; });
  updateInterestSelCount();
}
async function deleteSelectedInterests(){
  const ids = [...document.querySelectorAll('.ig-check')].filter(c=>c.checked).map(c=>c.value);
  if(ids.length===0) return;
  if(!confirm(`選択した ${ids.length} 件を削除しますか？\n（この操作は取り消せません）`)) return;
  const btn = document.getElementById('ig-delsel');
  if(btn){ btn.disabled = true; btn.textContent = '削除中...'; }
  let ok = 0;
  for(const id of ids){
    try {
      const res = await fetch('/api/interest-forms', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: _adminPw, action: 'delete', id })
      });
      const data = await res.json();
      if(data.ok || res.ok){
        ok++;
        const row = document.getElementById('irow-' + id);
        if(row){ row.remove(); }
        _interestRows = _interestRows.filter(r => String(r.id) !== String(id));
      }
    } catch(e){}
  }
  const all = document.getElementById('ig-selall'); if(all) all.checked = false;
  updateInterestSelCount();
  toast(`${ok}件を削除しました`);
}

async function markBizHandled(id, handled, btn){
  if(!id) return;
  btn.disabled = true;
  try {
    const res = await fetch('/api/biz-inquiry', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: _adminPw, action: 'mark', id, handled })
    });
    const data = await res.json();
    if(data.ok || res.ok){
      const r = _bizRows.find(x => String(x.id) === String(id));
      if(r) r.handled = handled;
      renderBiz();
      toast(handled ? '対応済にしました' : '未対応に戻しました');
    } else { btn.disabled = false; toast('更新に失敗しました'); }
  } catch(e){ btn.disabled = false; toast('エラーが発生しました'); }
}

async function deleteBizRow(id, btn){
  if(!id) return;
  if(!confirm('この問い合わせを削除しますか？\n（この操作は取り消せません）')) return;
  btn.disabled = true; btn.textContent = '削除中...';
  try {
    const res = await fetch('/api/biz-inquiry', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: _adminPw, action: 'delete', id })
    });
    const data = await res.json();
    if(data.ok || res.ok){
      const row = document.getElementById('brow-' + id);
      if(row){ row.style.transition='opacity .3s'; row.style.opacity='0'; setTimeout(()=>row.remove(), 300); }
      _bizRows = _bizRows.filter(r => String(r.id) !== String(id));
      toast('削除しました');
    } else { btn.disabled = false; btn.textContent = '🗑 削除'; toast('削除に失敗しました'); }
  } catch(e){ btn.disabled = false; btn.textContent = '🗑 削除'; toast('エラーが発生しました'); }
}

function downloadBizCsv(){
  const rows = _bizRows;
  if(!rows || rows.length === 0){ toast('データがありません'); return; }
  const headers = ['日時','会社名','お名前','メール','電話','従業員規模','ご相談内容','対応状況'];
  const escape = v => `"${String(v==null?'':v).replace(/"/g,'""')}"`;
  const lines = [headers.map(escape).join(',')];
  rows.forEach(r => {
    const dt = r.created_at ? new Date(r.created_at).toLocaleString('ja-JP') : '';
    lines.push([dt, r.company, r.name, r.email, r.tel, r.size, r.message, r.handled?'対応済':'未対応'].map(escape).join(','));
  });
  const blob = new Blob(['﻿' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `biz_inquiries_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadInterestsCsv(){
  const rows = _interestRows;
  if(!rows || rows.length === 0){ toast('データがありません'); return; }
  const typeLabel = {empathy:'共感', collaborate:'参画', hire:'転職'};
  const headers = ['日時','種別','氏名','メールアドレス','対象企業','対象経営層','価値観','刺さった言葉','希望接点','職場','年齢','自己紹介','共感理由','関わり方','コメント','LINE連携'];
  const escape = v => `"${String(v==null?'':v).replace(/"/g,'""')}"`;
  const csvLines = [headers.map(escape).join(',')];
  rows.forEach(r => {
    const fd = r.form_data || {};
    const dt = r.created_at ? new Date(r.created_at).toLocaleString('ja-JP') : '';
    const values = Array.isArray(r.ai_values) ? r.ai_values.join(' | ') : '';
    csvLines.push([
      dt,
      typeLabel[r.intent_type] || r.intent_type || '',
      fd.name || '',
      fd.email || '',
      r.company_name || '',
      r.ceo_name || '',
      values,
      r.q1_answer || '',
      r.q3_answer || '',
      fd.job || '',
      fd.age || '',
      fd.self_intro || '',
      fd.empathy_reason || '',
      fd.involvement || '',
      fd.comment || '',
      r.line_id ? '済' : '',
    ].map(escape).join(','));
  });
  const bom = '﻿'; // Excel用BOM（文字化け防止）
  const blob = new Blob([bom + csvLines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `interest_forms_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('CSVをダウンロードしました');
}

function _dist(rows, getter){
  const map = {};
  rows.forEach(r=>{ const vals = getter(r); (Array.isArray(vals)?vals:[vals]).forEach(v=>{ if(v&&String(v).trim()){ const k=String(v).trim(); map[k]=(map[k]||0)+1; } }); });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]);
}
function _bar(label, count, total){
  const pct = total? Math.round(count/total*100):0;
  return `<div style="margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text);margin-bottom:3px"><span style="flex:1;padding-right:8px">${escapeHtmlA(label)}</span><span style="color:var(--text3);white-space:nowrap">${count}件 / ${pct}%</span></div>
    <div style="height:7px;background:rgba(0,0,0,0.06);border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--teal)"></div></div>
  </div>`;
}
function escapeHtmlA(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// SupabaseストレージURLからパスを抽出して画像を削除
async function deleteStoragePhoto(urlInputId, statusId, previewId, bucket){
  const inp = document.getElementById(urlInputId);
  const url = inp?.value.trim();
  if(!url){ toast('削除する画像URLがありません'); return; }
  if(!confirm('Supabase Storageからこの画像を削除しますか？\n（この操作は取り消せません）')) return;

  const statusEl = document.getElementById(statusId);
  if(statusEl) statusEl.textContent = '削除中...';

  // URL から /object/public/{bucket}/ 以降のパスを抽出
  // 例: https://xxx.supabase.co/storage/v1/object/public/article-images/articles/123.jpg
  //     → articles/123.jpg
  const marker = `/object/public/${bucket}/`;
  const idx = url.indexOf(marker);
  if(idx === -1){
    if(statusEl) statusEl.textContent = 'URLの形式が不正です';
    toast('Supabase Storage以外の画像は削除できません');
    return;
  }
  const path = url.slice(idx + marker.length);

  if(!supabaseClient){ toast('Supabase未接続'); return; }
  const { error } = await supabaseClient.storage.from(bucket).remove([path]);
  if(error){
    if(statusEl) statusEl.textContent = '削除失敗: ' + error.message;
    toast('削除に失敗しました: ' + error.message);
    return;
  }
  // URLをクリア & プレビュー非表示
  if(inp) inp.value = '';
  const preview = document.getElementById(previewId);
  if(preview) preview.style.display = 'none';
  if(statusEl) statusEl.textContent = '削除完了 ✓';
  toast('画像をStorageから削除しました');
}

// ===== 写真アップロード =====
function updatePhotoPreview(){
  const url = document.getElementById('co-photo-url').value.trim();
  const preview = document.getElementById('co-photo-preview');
  const img = document.getElementById('co-photo-img');
  if(url && preview && img){
    img.src = url;
    img.onerror = () => { preview.style.display='none'; };
    img.onload = () => { preview.style.display='block'; };
  } else if(preview){
    preview.style.display='none';
  }
}

async function handlePhotoSelect(e){
  const file = e.target.files?.[0];
  if(!file) return;
  const statusEl = document.getElementById('co-photo-status');
  if(statusEl) statusEl.textContent = 'アップロード中...';
  try {
    const url = await uploadPhoto(file);
    if(url){
      const urlInput = document.getElementById('co-photo-url');
      if(urlInput) urlInput.value = url;
      updatePhotoPreview();
      if(statusEl) statusEl.textContent = '✓ アップロード完了';
      toast('写真をアップロードしました');
    }
  } catch(err) {
    if(statusEl) statusEl.textContent = '⚠️ アップロード失敗';
    toast('写真アップロード失敗: ' + (err.message||err));
  }
  e.target.value = '';
}

async function uploadPhoto(file){
  if(!supabaseClient) throw new Error('Supabaseが初期化されていません');
  const ext = (file.name.split('.').pop()||'jpg').toLowerCase();
  const path = `companies/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
  const { error: upErr } = await supabaseClient.storage
    .from('company-photos')
    .upload(path, file, { cacheControl: '31536000', upsert: false });
  if(upErr) throw upErr;
  const { data } = supabaseClient.storage.from('company-photos').getPublicUrl(path);
  return data.publicUrl;
}

function saveCo(){
  const name=document.getElementById('co-name').value.trim();
  const ceo=document.getElementById('co-ceo').value.trim();
  const title=document.getElementById('co-title').value.trim();
  const quote=document.getElementById('co-quote').value.trim();
  const catchphrase=(document.getElementById('coCatchphrase')?.value||'').trim();
  const cc_what=(document.getElementById('coCcWhat')?.value||'').trim();
  const cc_value=(document.getElementById('coCcValue')?.value||'').trim();
  const cc_life=(document.getElementById('coCcLife')?.value||'').trim();
  const body=document.getElementById('co-body').value.trim();
  if(!name||!ceo||!title||!body){ toast('必須項目を入力してください'); return; }
  const q1=[1,2,3,4].map(i=>document.getElementById('co-q'+i).value.trim()).filter(Boolean);
  const isEdit = Boolean(editingCompanyId);
  const arr=loadCompanies();
  const existingCo = isEdit ? (arr.find(x=>x.id===editingCompanyId)||{}) : {};
  const co={
    id: editingCompanyId || ('co_'+Date.now()),
    name,ceo,
    photoUrl:document.getElementById('co-photo-url').value.trim(),
    type:document.getElementById('co-type').value,
    plan:document.getElementById('co-plan').value,
    articleType:document.getElementById('co-article-type').value,
    industry:document.getElementById('co-industry').value.trim(),
    employeeSize:document.getElementById('co-size').value.trim(),
    companyIntro:document.getElementById('co-intro').value.trim(),
    // backward compatibility
    size:document.getElementById('co-size').value.trim(),
    intro:document.getElementById('co-intro').value.trim(),
    tags:document.getElementById('co-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    wantedProfile:(document.getElementById('co-wanted')?.value||'').trim(),

    fee:document.getElementById('co-fee').value||'',
    status:'active',
    created:existingCo.created||new Date().toLocaleDateString('ja-JP'),
    created_at:existingCo.created_at||new Date().toISOString(),
    reactions:existingCo.reactions||0,

  if(isEdit){

function editCo(id){
  const co = loadCompanies().find(c=>c.id===id);
  if(!co){ toast('企業データが見つかりません'); return; }
  editingCompanyId = id;
  switchTab('addco');
  setTimeout(()=>{
    const set=(k,v)=>{ const el=document.getElementById(k); if(el) el.value=v||''; };
    set('co-name',co.name); set('co-ceo',co.ceo); set('co-photo-url',co.photoUrl);
    set('co-type',co.type); set('co-plan',co.plan); set('co-article-type',co.articleType);
    set('co-industry',co.industry); set('co-size',co.employeeSize||co.size);
    set('co-intro',co.companyIntro||co.intro); set('co-tags',(co.tags||[]).join(', '));
    set('co-title',co.title); set('co-quote',co.quote); set('co-body',co.body); set('co-fee',co.fee);
    if(document.getElementById('coCatchphrase')) document.getElementById('coCatchphrase').value=co.catchphrase||'';
    set('coCcWhat', co.cc_what); set('coCcValue', co.cc_value); set('coCcLife', co.cc_life);
    set('co-wanted', co.wantedProfile||'');
    [1,2,3,4].forEach((i,idx)=>set('co-q'+i,(co.q1||[])[idx]||''));
    updateBodyCounter();
    updatePhotoPreview();
  },0);
}

function markArticleTypeManual(){
  const at = document.getElementById('co-article-type');
  if(at) at.dataset.manual = '1';
  updateBodyCounter();
}

function syncArticleTypeFromPlan(force = false){
  const plan = document.getElementById('co-plan');
  const at = document.getElementById('co-article-type');
  if(!plan || !at) return;
  const next = plan.value === 'standard' ? 'standard' : 'light';
  if(force || at.dataset.manual !== '1'){
    at.value = next;
  }
  updateBodyCounter();
}

function updateBodyCounter(){
  const body = document.getElementById('co-body');
  const at = document.getElementById('co-article-type');
  const counter = document.getElementById('co-body-counter');
  if(!body || !at || !counter) return;
  const limit = at.value === 'standard' ? 2000 : 800;
  const len = body.value.trim().length;
  counter.textContent = `${len} / ${limit}`;
  counter.style.color = len > limit ? 'var(--hot)' : 'var(--text3)';
  body.placeholder = at.value === 'standard'
    ? '1500〜2000字推奨。写真は ![説明](URL) 形式で差し込み可'
    : '〜800字推奨';
}

function initArticleTypeControls(){
  const at = document.getElementById('co-article-type');
  if(at) at.dataset.manual = '0';
  syncArticleTypeFromPlan(true);
  updateBodyCounter();
}

async function genCoArticle(){
  const name=document.getElementById('co-name').value.trim();
  const ceo=document.getElementById('co-ceo').value.trim();
  const type=document.getElementById('co-type').value;
  const hint=document.getElementById('co-body').value.trim();
  if(!name||!ceo){ toast('会社名と経営層名を入力してからAI生成してください'); return; }
  const btn=document.querySelector('button[onclick="genCoArticle()"]');
  btn.textContent='生成中...'; btn.disabled=true;
  const result=document.getElementById('co-ai-result');
  result.style.display='block';
  result.innerHTML='<div class="ai-load" style="height:40px"></div>';
  const typeLabel={successor:'後継者・アトツギ',second_founding:'第二創業',new_biz:'新規事業責任者'}[type]||type;
  try{
    const res=await fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system:'あなたはソコナラ（地域キャリア共創プラットフォーム）の記事ライターです。経営層の人物像・ストーリーを伝える記事をJSON形式のみで生成してください（前置き・コードブロック不要）。\n形式：{"title":"記事タイトル（20〜30字）","quote":"一番刺さるフレーズ（30〜50字）","body":"記事本文（400〜600字）","q1":["選択肢1","選択肢2","選択肢3","選択肢4"]}',
        user:`会社名：${name}\n経営層名：${ceo}\nタイプ：${typeLabel}\nヒント・背景情報：${hint||'特になし'}`
      })});
    const d=await res.json();
    const m=d.content[0].text.match(/\{[\s\S]*\}/);
    if(m){
      const p=JSON.parse(m[0]);
      document.getElementById('co-title').value=p.title||'';
      document.getElementById('co-quote').value=p.quote||'';
      if(document.getElementById('coCatchphrase')) document.getElementById('coCatchphrase').value=p.catchphrase||'';
      document.getElementById('co-body').value=p.body||'';
      [1,2,3,4].forEach((i,idx)=>{ const el=document.getElementById('co-q'+i); if(el) el.value=p.q1?.[idx]||''; });
      result.innerHTML='<span style="color:var(--teal);font-size:11px">✓ AI生成完了。内容を確認して「登録する」を押してください。</span>';
    }
  }catch{
    result.innerHTML='<span style="color:rgba(255,100,100,0.8);font-size:11px">生成に失敗しました。手動で入力してください。</span>';
  }
  btn.textContent='✦ AIで記事を生成'; btn.disabled=false;
}

function deleteCo(id){
  if(!confirm('この企業を削除しますか？')) return;
  const arr=loadCompanies().filter(c=>c.id!==id);
  saveCompanies(arr);
  renderSidebarCompanies();
  toast('削除しました');
  renderCoList();
}
function deletePj(id){
  if(!confirm('この共創テーマを削除しますか？')) return;
  const arr=loadProjects().filter(p=>p.id!==id);
  saveProjects(arr);
  toast('削除しました');
  renderCoList();
}

// 記事本文からAIで「ソコナラより」「こんな人と出会いたい」を生成
async function genArticleMeta(silent){
  if(!_articleSections || !_articleSections.length){ if(!silent) toast('先にNotion記事を解析してください'); return; }
  const co=loadCompanies().find(c=>String(c.id)===String(_articleCompanyId))||{};
  const articleText=_articleSections.map(s=>[s.heading,s.body,(s.items||[]).map(i=>(i.q||'')+' '+(i.a||'')).join(' ')].filter(Boolean).join('\n')).join('\n\n');
  const btn=document.getElementById('art-genmeta-btn'); if(btn){ btn.disabled=true; btn.textContent='生成中…'; }
  try{
    const res=await fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'articlemeta',data:{ceo:co.ceo||'',company:co.name||co.company||'',articleText}})});
    if(!res.ok) throw new Error('API '+res.status);
    const d=await res.json();
    const txt=d.content?.[0]?.text||''; const m=txt.match(/\{[\s\S]*\}/);
    const parsed=JSON.parse(m?m[0]:txt);
    const sc=document.getElementById('art-summary-comment'), wp=document.getElementById('art-wanted');
    if(sc && parsed.summaryComment) sc.value=parsed.summaryComment;
    if(wp && parsed.wantedProfile) wp.value=parsed.wantedProfile;
    if(!silent) toast('AIで生成しました（必要に応じて手直しを）');
  }catch(e){ if(!silent) toast('生成失敗: '+(e.message||e)); }
  finally{ if(btn){ btn.disabled=false; btn.textContent='✨ AIで自動生成'; } }
}

function parseNotion(text){
  const lines = text.split('\n');
  let title = '';
  const sections = [];
  const meta = { tags:[], quote:'', catchphrase:'', q1:[], companyIntro:'' };
  let current = null;
  let inMeta = false;
  let inQ1 = false;
  let inAside = false;

  for(let i=0;i<lines.length;i++){
    const line = lines[i];
    const trimmed = line.trim();

    // <aside>ブロックをスキップ
    if(trimmed.startsWith('<aside>') || trimmed==='<aside>'){ inAside=true; continue; }
    if(trimmed.startsWith('</aside>') || trimmed==='</aside>'){ inAside=false; continue; }
    if(inAside) continue;

    // タイトル
    if(line.startsWith('# ') && !line.startsWith('## ') && !title){
      title = line.slice(2).trim(); continue;
    }
    // セクション見出し
    if(line.startsWith('## ')){
      if(current && !inMeta) pushSection(current, sections);
      const heading = line.slice(3).trim();
      inMeta = heading.includes('📋') || heading.includes('プラットフォーム登録');
      inQ1 = false;
      // カードタイトルは catchphrase として抽出
      if(heading==='カードタイトル' || heading.includes('カードタイトル')){
        let j=i+1;
        while(j<lines.length && !lines[j].trim()) j++;
        if(j<lines.length && !lines[j].startsWith('##') && !lines[j].startsWith('<')){
          meta.catchphrase = lines[j].trim();
          i = j;
        }
        current=null; continue;
      }
      const SKIP_HEADINGS = ['ファーストビュー','タイトル','本文','ヘッダー','フッター','カバー','ビジュアル','レイアウト','デザイン','メモ','備考','下書き','TODO','todo'];
      const shouldSkip = SKIP_HEADINGS.some(s=>heading.includes(s));
      if(inMeta || heading.includes('元情報') || shouldSkip){ current=null; continue; }
      const HEADING_MAP = {
        'リード':'はじめに', 'lead':'はじめに', 'LEAD':'はじめに',
        'プロフィール':'経歴・プロフィール', 'profile':'経歴・プロフィール',
      };
      const renamedHeading = HEADING_MAP[heading] || heading;
      const type = (heading.includes('に伺いました')||heading.includes('インタビュー')) ? 'qa'
                 : (heading.includes('リード文')||heading==='リード'||heading==='lead') ? 'lead'
                 : 'section';
      current = { heading: renamedHeading, lines:[], type };
      continue;
    }
    if(trimmed==='---') continue;

    // メタデータ解析
    if(inMeta){
      const bm = line.match(/^\*\*(.+?)\*\*/);
      if(bm){
        inQ1 = false;
        const k = bm[1];
        // **key**の後の値（全角スペース含む空白を除去）
        const rest = line.slice(bm[0].length).replace(/^[\s　\t]+/, '').trim();
        if(k==='タグ'){
          meta.tags = rest.split(/[,、,\s　]+/).filter(Boolean);
        } else if(k==='引用フレーズ'){
          meta.quote = rest;
        } else if(k==='キャッチフレーズ'){
          meta.catchphrase = rest;
        } else if(k.includes('Q1選択肢')){
          inQ1 = true;
        } else if(k==='会社一言紹介'){
          if(rest){
            meta.companyIntro = rest;
          } else {
            let j=i+1;
            const introParts=[];
            while(j<lines.length){
              if(lines[j].match(/^\*\*/)||lines[j].startsWith('##')) break;
              if(lines[j].trim()) introParts.push(lines[j].trim());
              j++;
            }
            meta.companyIntro=introParts.join('\n');
            i=j-1;
          }
        }
      }
      if(inQ1 && line.startsWith('- ')){
        // "- Why：なぜ..." → "なぜ..."（Why: などのプレフィックスを除去）
        const choice = line.slice(2).replace(/^[^：：:]+[：：:]\s*/,'').trim();
        if(choice) meta.q1.push(choice);
      }
      continue;
    }
    if(current) current.lines.push(line);
  }
  if(current && !inMeta) pushSection(current, sections);
  return {title, sections, meta};
}

function pushSection(sec, sections){
  const bodyLines = sec.lines.filter(l=>l.trim()&&l.trim()!=='---');
  if(sec.type==='qa'){
    const items=[];
    let cq=null, ca=[];
    for(const l of bodyLines){
      // **――…** or **――…？** patterns
      const qm=l.match(/^\*\*――?\s*(.+?)\*\*$/)||l.match(/^\*\*[―-]{1,2}\s*(.+?)\*\*$/);
      if(qm){ if(cq!==null) items.push({q:cq,a:ca.join('\n').trim()}); cq=qm[1].trim(); ca=[]; }
      else if(cq!==null&&l.trim()) ca.push(l.trim());
    }
    if(cq!==null) items.push({q:cq,a:ca.join('\n').trim()});
    sections.push({type:'qa',heading:sec.heading,items,photoUrl:''});
  } else {
    const body = bodyLines.join('\n').trim();
    if(!body) return;
    sections.push({type:'section',heading:sec.heading,body,photoUrl:''});
  }
}

function fillMeta(meta){
  const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.value=v||''; };
  set('art-tags', (meta.tags||[]).join(', '));
  set('art-catchphrase', meta.catchphrase||'');
  set('art-quote', meta.quote||'');
  set('art-intro', meta.companyIntro||'');
  set('art-summary-comment', meta.summaryComment||'');
  set('art-wanted', meta.wantedProfile||'');
  const q1El=document.getElementById('art-q1');
  if(q1El) q1El.value=(meta.q1||[]).join('\n');
}

      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ type:'q1rewrite', data:{ lines } })
    });
    const json=await res.json();
    const text=json.content?.[0]?.text||'';
    let rewritten;
    try{ rewritten=JSON.parse(text); }catch(e){ rewritten=null; }
    if(Array.isArray(rewritten?.lines) && rewritten.lines.length){
      q1El.value=rewritten.lines.join('\n');
      q1El.dispatchEvent(new Event('input'));
      toast('体言止めに変換しました');
    } else {
      toast('変換結果を取得できませんでした');
    }
  }catch(e){ toast('エラー：'+e.message); }
  finally{ if(btn){ btn.textContent='✦ AIで体言止めに変換'; btn.disabled=false; } }
}

function refreshCardLabelChips(){
  const q1El=document.getElementById('art-q1');
  const choices=(q1El?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
  const current=document.getElementById('art-card-label')?.value||'';
  const container=document.getElementById('art-card-label-chips');
  if(!container) return;
  if(!choices.length){
    container.innerHTML='<span style="font-size:11px;color:var(--text3)">Q1選択肢を入力すると選べます</span>';
    return;
  }
  container.innerHTML=choices.map(opt=>`<div class="achip" data-val="${escHtml(opt)}" onclick="toggleCardLabel(this,'${opt.replace(/'/g,'\\\'')}')" style="padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:11px;cursor:pointer;transition:all .15s">${escHtml(opt)}</div>`).join('');
  // 既存の選択状態を復元
  if(current) setCardLabel(current);
}
async function toggleCardLabel(el, val){
  const current=document.getElementById('art-card-label')?.value||'';
  // 同じチップを再クリックで解除
  if(current.replace(/\n/g,' ').trim()===val.trim()){
    setCardLabel(''); return;
  }
  // チップをアクティブに
  _activateChip(val);
  // テキストエリアを表示してローディング
  const wrap=document.getElementById('art-card-label-edit-wrap');
  const ta=document.getElementById('art-card-label-edit');
  if(wrap) wrap.style.display='block';
  if(ta){ ta.value='体言止めに変換中…'; ta.disabled=true; }
  // AI変換
  try{
    const res=await fetch('/api/feedback',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'cardphrase', data:{line:val}})
    });
    const json=await res.json();
    const text=json.content?.[0]?.text||'';
    let converted; try{ converted=JSON.parse(text); }catch(e){ converted=null; }
    const phrase=converted?.phrase||val;
    if(ta){ ta.value=phrase; ta.disabled=false; ta.focus(); }
    const inp=document.getElementById('art-card-label');
    if(inp) inp.value=phrase;
  }catch(e){
    if(ta){ ta.value=val; ta.disabled=false; }
    const inp=document.getElementById('art-card-label');
    if(inp) inp.value=val;
  }
}
function _activateChip(val){
  document.querySelectorAll('#art-card-label-chips .achip').forEach(ch=>{
    const active=ch.dataset.val===val;
    ch.style.background=active?'var(--teal)':'var(--white)';
    ch.style.color=active?'#fff':'';
    ch.style.borderColor=active?'var(--teal)':'var(--border)';
  });
}
function setCardLabel(val){
  const inp=document.getElementById('art-card-label');
  if(inp) inp.value=val;
  const wrap=document.getElementById('art-card-label-edit-wrap');
  const ta=document.getElementById('art-card-label-edit');
  if(val){
    if(wrap) wrap.style.display='block';
    if(ta) ta.value=val;
  } else {
    if(wrap) wrap.style.display='none';
    if(ta) ta.value='';
    // チップ全解除
    document.querySelectorAll('#art-card-label-chips .achip').forEach(ch=>{
      ch.style.background='var(--white)'; ch.style.color=''; ch.style.borderColor='var(--border)';
    });
  }
}
function syncCardLabel(){
  const ta=document.getElementById('art-card-label-edit');
  const inp=document.getElementById('art-card-label');
  if(inp && ta) inp.value=ta.value;
}

// ===== セクション一覧（編集可能） =====

    const typeLabel={section:'本文',qa:'Q&A',lead:'リード'}[sec.type]||'本文';

    const bodyEditor = sec.type==='qa'
      ? (sec.items||[]).map((item,j)=>`

            <div style="display:flex;align-items:center;margin-bottom:4px">
              <span style="font-size:10px;color:var(--text2);font-weight:700">Q${j+1}</span>
              <button onclick="deleteQaItem(${i},${j})" style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:8px;padding:1px 6px;border:1px solid rgba(192,52,26,0.3);background:none;cursor:pointer;border-radius:2px;color:var(--hot)">✕ 削除</button>
            </div>
            <input value="${escHtml(item.q||'')}" ${inp('','updateQItem('+i+','+j+',\'q\',this.value)')} style="width:100%;box-sizing:border-box;padding:5px 8px;border:1px solid var(--border);border-radius:2px;font-size:12px;font-family:inherit;margin-bottom:6px">
            <div style="font-size:10px;color:var(--text2);margin-bottom:4px">A${j+1}</div>
            <textarea rows="3" ${inp('','updateQItem('+i+','+j+',\'a\',this.value)')} style="width:100%;box-sizing:border-box;padding:5px 8px;border:1px solid var(--border);border-radius:2px;font-size:12px;font-family:inherit;resize:vertical">${escHtml(item.a||'')}</textarea>
          </div>`).join('')
        + `<button onclick="addQaItem(${i})" style="font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 12px;background:var(--navy);color:#fff;border:none;border-radius:2px;cursor:pointer;margin-top:4px">＋ Q&A追加</button>`
      : `<textarea rows="5" oninput="updateSecBody(${i},this.value)" style="width:100%;box-sizing:border-box;padding:6px 8px;border:1px solid var(--border);border-radius:2px;font-size:12px;font-family:inherit;resize:vertical;line-height:1.7">${escHtml(sec.body||'')}</textarea>`;

    return `
    <div style="border-bottom:1px solid rgba(228,227,227,0.5);padding:14px 16px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        ${photoThumb}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span style="font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 7px;background:${typeColor};color:#fff;border-radius:2px;flex-shrink:0">${typeLabel}</span>
            <button onclick="openPhotoPickerForSection(${i})" style="font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 8px;border:1px solid var(--border);background:none;cursor:pointer;border-radius:2px;color:var(--text2);flex-shrink:0">${sec.photoUrl?'写真変更':'📷'}</button>
            ${sec.photoUrl?`<button onclick="deleteSectionPhoto(${i})" style="font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 8px;border:1px solid rgba(192,52,26,0.3);background:none;cursor:pointer;border-radius:2px;color:var(--hot);flex-shrink:0">🗑 写真削除</button>`:''}
            <button onclick="deleteSection(${i})" style="font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 8px;border:1px solid rgba(192,52,26,0.4);background:rgba(192,52,26,0.06);cursor:pointer;border-radius:2px;color:var(--hot);flex-shrink:0;margin-left:auto">✕ セクション削除</button>
          </div>
          <input value="${escHtml(sec.heading||'')}" placeholder="見出し" oninput="updateSecHeading(${i},this.value)" style="width:100%;box-sizing:border-box;padding:6px 8px;border:1px solid var(--border);border-radius:2px;font-size:13px;font-weight:700;font-family:inherit;color:var(--navy);outline:none">

function deleteSection(i){
  if(!confirm(`セクション「${_articleSections[i].heading||'無題'}」を削除しますか？`)) return;
  _articleSections.splice(i,1);
  renderSectionsList();
}
function updateSecHeading(i,val){ _articleSections[i].heading=val; }
function updateSecBody(i,val){ _articleSections[i].body=val; }
function updateQItem(i,j,field,val){
  if(!_articleSections[i].items) _articleSections[i].items=[];
  if(!_articleSections[i].items[j]) _articleSections[i].items[j]={q:'',a:''};
  _articleSections[i].items[j][field]=val;
}

function clearSectionPhoto(i){
  _articleSections[i].photoUrl='';
  renderSectionsList();
}

// セクション写真をStorageから削除（確認付き）
async function deleteSectionPhoto(i){
  const url = _articleSections[i]?.photoUrl;
  if(!url) return;
  const isStorage = url.includes('/storage/v1/object/public/article-images/');
  const msg = isStorage
    ? 'この写真をセクションから外し、Supabase Storageからも完全削除しますか？\n（写真ライブラリに残す場合は「キャンセル」→「写真変更」で別の写真を選んでください）'
    : 'この写真をセクションから外しますか？';
  if(!confirm(msg)) return;
  if(isStorage && supabaseClient){
    const marker = '/object/public/article-images/';
    const idx = url.indexOf(marker);
    if(idx !== -1){
      const path = url.slice(idx + marker.length);
      await supabaseClient.storage.from('article-images').remove([path]);
      // ライブラリからも削除
      _articlePhotos = _articlePhotos.filter(p => p.url !== url);
      renderPhotoLib();
    }
  }
  _articleSections[i].photoUrl = '';
  renderSectionsList();
  toast('写真を削除しました');
}

// セクション追加
function addSection(type){
  const sec = { type: type||'section', heading:'', body:'', photoUrl:'' };
  if(type==='qa') sec.items = [{q:'',a:''}];
  _articleSections.push(sec);
  // art-parsed が非表示なら表示
  const parsed = document.getElementById('art-parsed');
  if(parsed) parsed.style.display = 'block';
  renderSectionsList();
  // 追加したセクションまでスクロール
  setTimeout(()=>{
    const el = document.getElementById('art-sections-list');
    if(el && el.lastElementChild) el.lastElementChild.scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 80);
}

// Q&Aアイテム追加
function addQaItem(i){
  if(!_articleSections[i].items) _articleSections[i].items=[];
  _articleSections[i].items.push({q:'',a:''});
  renderSectionsList();
}

// Q&Aアイテム削除
function deleteQaItem(i,j){
  if(!confirm(`Q${j+1}を削除しますか？`)) return;
  _articleSections[i].items.splice(j,1);
  renderSectionsList();
}

// 写真ライブラリから削除（Storage含む）
async function deletePhotoFromLib(i){
  const p = _articlePhotos[i];
  if(!p) return;
  const isStorage = p.url.includes('/storage/v1/object/public/article-images/');
  const msg = isStorage
    ? `「${p.name}」をライブラリとSupabase Storageから完全削除しますか？`
    : `「${p.name}」をライブラリから削除しますか？`;
  if(!confirm(msg)) return;
  if(isStorage && supabaseClient){
    const marker = '/object/public/article-images/';
    const idx = p.url.indexOf(marker);
    if(idx !== -1){
      const path = p.url.slice(idx + marker.length);
      const {error} = await supabaseClient.storage.from('article-images').remove([path]);
      if(error){ toast('Storage削除失敗: ' + error.message); return; }
    }
  }
  _articlePhotos.splice(i,1);
  renderPhotoLib();
  toast('削除しました');
}

// ===== 写真ライブラリ =====
function renderPhotoLib(){
  const el=document.getElementById('art-photo-lib');
  if(!el) return;
  if(!_articlePhotos.length){ el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:8px 0">まだ写真がありません</div>'; return; }
  el.innerHTML=_articlePhotos.map((p,i)=>{
    const safeUrl=escHtml(p.url);
    const safeName=escHtml(p.name);
    return `<div style="position:relative;display:inline-block">
      <div style="cursor:pointer" onclick="_assignPhoto(${i})" title="クリックでセクションに割り当て：${safeName}">
        <img src="${safeUrl}" style="width:80px;height:60px;object-fit:cover;border-radius:3px;border:2px solid var(--border);display:block">
        <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(28,42,84,0.7);font-size:8px;color:#fff;padding:2px 4px;border-radius:0 0 3px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${safeName}</div>
      </div>
      <button onclick="event.stopPropagation();deletePhotoFromLib(${i})" title="Storageから削除" style="position:absolute;top:-5px;right:-5px;width:17px;height:17px;background:var(--hot);color:#fff;border:none;border-radius:50%;font-size:10px;cursor:pointer;line-height:1;padding:0;display:flex;align-items:center;justify-content:center">×</button>
    </div>`;
  }).join('');
}

let _pickingForSection = null;
function openPhotoPickerForSection(idx){
  _pickingForSection = idx;
  if(!_articlePhotos.length){
    toast('先に写真をアップロードしてください');
    return;
  }
  // 写真ライブラリにフォーカス
  const lib=document.getElementById('art-photo-lib');
  if(lib){ lib.scrollIntoView({behavior:'smooth'});
    lib.style.outline='2px solid var(--teal)';
    setTimeout(()=>lib.style.outline='',2000);
  }
  document.getElementById('art-upload-status').textContent='写真をクリックしてセクションに割り当てください';
}

function _assignPhoto(photoIdx){
  const p=_articlePhotos[photoIdx];
  if(!p) return;
  assignPhotoToTarget(p.url);
}
function assignPhotoToTarget(url){
  if(_pickingForSection===null){ toast('写真を選択するにはセクションの「写真選択」を押してください'); return; }
  _articleSections[_pickingForSection].photoUrl = url;
  _pickingForSection = null;
  document.getElementById('art-upload-status').textContent='写真を割り当てました ✓';
  renderSectionsList();
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addPhotoByUrl(){
  const input=document.getElementById('art-photo-url-input');
  const url=(input?.value||'').trim();
  if(!url||!url.startsWith('http')){ toast('有効なURLを入力してください'); return; }
  const name=url.split('/').pop().split('?')[0]||'photo';
  _articlePhotos.push({url,name});
  renderPhotoLib();
  if(input) input.value='';
  document.getElementById('art-upload-status').textContent='✓ URLを追加しました';
}

// ===== 写真アップロード =====
async function handlePhotoDrop(e){
  e.preventDefault();
  e.currentTarget.style.borderColor='var(--border)';
  e.currentTarget.style.background='';
  await uploadPhotos(e.dataTransfer.files);
}
async function handlePhotoFileSelect(files){
  await uploadPhotos(files);
}

async function uploadPhotos(files){
  if(!files||!files.length) return;
  const status=document.getElementById('art-upload-status');
  if(status) status.textContent=`${files.length}枚アップロード中...`;

  // Supabase Storage bucketは事前にダッシュボードで作成が必要
  // Storage → New bucket → 名前: article-images → Public: ON

  const uploaded=[];
  for(const file of Array.from(files)){
    if(!file.type.startsWith('image/')){ continue; }
    try{
      let url='';
      if(supabaseClient){
        const ext=file.name.split('.').pop().toLowerCase();
        const path=`articles/${_articleCompanyId||'misc'}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
        const {error:upErr}=await supabaseClient.storage.from('article-images').upload(path,file,{contentType:file.type,upsert:false});
        if(upErr) throw upErr;
        const {data:urlData}=supabaseClient.storage.from('article-images').getPublicUrl(path);
        url=urlData.publicUrl;
      } else {
        // Supabase未接続時：ObjectURL（ローカルのみ）
        url=URL.createObjectURL(file);
      }
      uploaded.push({url, name:file.name});
    }catch(err){
      console.error('upload error:', err);
      if(status) status.textContent=`⚠️ アップロード失敗: ${err.message||err}`;
    }
  }
  _articlePhotos=[..._articlePhotos,...uploaded];
  renderPhotoLib();
  if(status) status.textContent=`✓ ${uploaded.length}枚アップロード完了`;
}

// ===== 保存 =====
async function saveArticle(){
  const companyId=document.getElementById('art-company')?.value;
  if(!companyId){ toast('対象企業を選択してください'); return; }
  if(!_articleSections.length){ toast('記事を解析してください'); return; }

  const statusEl=document.getElementById('art-save-status');
  if(statusEl) statusEl.textContent='保存中...';

  const tags=(document.getElementById('art-tags')?.value||'').split(/[,、,\s　]+/).filter(Boolean);
  const catchphrase=document.getElementById('art-catchphrase')?.value.trim()||'';
  const quote=document.getElementById('art-quote')?.value.trim()||'';
  const companyIntro=document.getElementById('art-intro')?.value.trim()||'';
  const summaryComment=document.getElementById('art-summary-comment')?.value.trim()||'';
  const wantedProfile=document.getElementById('art-wanted')?.value.trim()||'';
  const q1=(document.getElementById('art-q1')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
  const cardLabel=(document.getElementById('art-card-label-edit')?.value||document.getElementById('art-card-label')?.value||'').trim();
  // 基本情報
  const coName=document.getElementById('art-co-name')?.value.trim()||'';
  const coCeo=document.getElementById('art-co-ceo')?.value.trim()||'';
  const photoUrl=document.getElementById('art-profile-photo-url')?.value.trim()||'';
  const heroUrl=document.getElementById('art-hero-photo-url')?.value.trim()||'';
  const type=document.getElementById('art-type')?.value||'manager';
  const plan=document.getElementById('art-plan')?.value||'light';
  const articleType=document.getElementById('art-article-type')?.value||'standard';
  const btags=[...document.querySelectorAll('.art-bt:checked')].map(e=>e.value);
  const rtags=[...document.querySelectorAll('.art-rt:checked')].map(e=>e.value);
  const wb={}; document.querySelectorAll('.art-wb').forEach(e=>{ wb[e.getAttribute('data-k')]=parseInt(e.value)||0; });

  const companies=loadCompanies();
  const idx=companies.findIndex(c=>String(c.id)===String(companyId));
  if(idx<0){ toast('企業データが見つかりません'); return; }

  companies[idx]={
    ...companies[idx],
    name: coName||companies[idx].name, company: coName||companies[idx].company,
    ceo: coCeo||companies[idx].ceo,
    title: _articleTitle||companies[idx].title,
    body: JSON.stringify(_articleSections),
    tags, catchphrase, quote,
    companyIntro, summaryComment, wantedProfile, q1, cardLabel,
    photoUrl, heroUrl, type, plan, articleType, btags, rtags, wb
  };
  saveCompanies(companies);
  if(statusEl) statusEl.textContent='✓ 保存しました！';
  toast('記事を保存しました。');
}
