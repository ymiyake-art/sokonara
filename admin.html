async function toggleCardLabel(el, val){
  const current=document.getElementById('art-card-label')?.value||'';
  // 同じチップを再クリックで解除
  if(current.replace(/\n/g,' ').trim()===val.trim()){
    setCardLabel(''); return;
  }
  // チップをアクティブに
  _activateChip(val);
  // テキストエリアを表示してローディング
  const wrap=document.getElementById('art-card-label-edit-wrap');
  const ta=document.getElementById('art-card-label-edit');
  if(wrap) wrap.style.display='block';
  if(ta){ ta.value='体言止めに変換中…'; ta.disabled=true; }
  // AI変換
  try{
    const res=await fetch('/api/feedback',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'cardphrase', data:{line:val}})
    });
    const json=await res.json();
    const text=json.content?.[0]?.text||'';
    let converted; try{ converted=JSON.parse(text); }catch(e){ converted=null; }
    const phrase=converted?.phrase||val;
    if(ta){ ta.value=phrase; ta.disabled=false; ta.focus(); }
    const inp=document.getElementById('art-card-label');
    if(inp) inp.value=phrase;
  }catch(e){
    if(ta){ ta.value=val; ta.disabled=false; }
    const inp=document.getElementById('art-card-label');
    if(inp) inp.value=val;
  }
}
function _activateChip(val){
  document.querySelectorAll('#art-card-label-chips .achip').forEach(ch=>{
    const active=ch.dataset.val===val;
    ch.style.background=active?'var(--teal)':'var(--white)';
    ch.style.color=active?'#fff':'';
    ch.style.borderColor=active?'var(--teal)':'var(--border)';
  });
}
function setCardLabel(val){
  const inp=document.getElementById('art-card-label');
  if(inp) inp.value=val;
  const wrap=document.getElementById('art-card-label-edit-wrap');
  const ta=document.getElementById('art-card-label-edit');
  if(val){
    if(wrap) wrap.style.display='block';
    if(ta) ta.value=val;
  } else {
    if(wrap) wrap.style.display='none';
    if(ta) ta.value='';
    // チップ全解除
    document.querySelectorAll('#art-card-label-chips .achip').forEach(ch=>{
      ch.style.background='var(--white)'; ch.style.color=''; ch.style.borderColor='var(--border)';
    });
  }
}
function syncCardLabel(){
  const ta=document.getElementById('art-card-label-edit');
  const inp=document.getElementById('art-card-label');
  if(inp && ta) inp.value=ta.value;
}

// ===== セクション一覧（編集可能） =====
function renderSectionsList(){
  const el=document.getElementById('art-sections-list');
  if(!el) return;
  if(!_articleSections.length){ el.innerHTML='<div style="padding:20px;font-size:12px;color:var(--text3)">セクションがありません</div>'; return; }
  const inp = (val,fn)=>`style="width:100%;box-sizing:border-box;padding:6px 8px;border:1px solid var(--border);border-radius:2px;font-size:12px;font-family:inherit;outline:none;background:#fafafa" oninput="${fn}"`;
  el.innerHTML = _articleSections.map((sec,i)=>{
    const typeLabel={section:'本文',qa:'Q&A',lead:'リード'}[sec.type]||'本文';
    const typeColor={section:'var(--teal)',qa:'var(--navy)',lead:'#e67e22'}[sec.type]||'var(--teal)';
    const photoThumb = sec.photoUrl
      ? `<img src="${sec.photoUrl}" style="width:64px;height:48px;object-fit:cover;border-radius:3px;border:2px solid var(--teal);flex-shrink:0;cursor:pointer" onclick="openPhotoPickerForSection(${i})">`
      : `<div style="width:64px;height:48px;border:2px dashed var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--border);flex-shrink:0;cursor:pointer" onclick="openPhotoPickerForSection(${i})" title="写真を選択">+</div>`;

    const bodyEditor = sec.type==='qa'
      ? (sec.items||[]).map((item,j)=>`
          <div style="margin-bottom:8px;padding:8px;background:#f8f8f8;border-radius:3px;border:1px solid var(--border)">
            <div style="display:flex;align-items:center;margin-bottom:4px">
              <span style="font-size:10px;color:var(--text2);font-weight:700">Q${j+1}</span>
              <button onclick="deleteQaItem(${i},${j})" style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:8px;padding:1px 6px;border:1px solid rgba(192,52,26,0.3);background:none;cursor:pointer;border-radius:2px;color:var(--hot)">✕ 削除</button>
            </div>
            <input value="${escHtml(item.q||'')}" ${inp('','updateQItem('+i+','+j+',\'q\',this.value)')} style="width:100%;box-sizing:border-box;padding:5px 8px;border:1px solid var(--border);border-radius:2px;font-size:12px;font-family:inherit;margin-bottom:6px">
            <div style="font-size:10px;color:var(--text2);margin-bottom:4px">A${j+1}</div>
            <textarea rows="3" ${inp('','updateQItem('+i+','+j+',\'a\',this.value)')} style="width:100%;box-sizing:border-box;padding:5px 8px;border:1px solid var(--border);border-radius:2px;font-size:12px;font-family:inherit;resize:vertical">${escHtml(item.a||'')}</textarea>
          </div>`).join('')
        + `<button onclick="addQaItem(${i})" style="font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 12px;background:var(--navy);color:#fff;border:none;border-radius:2px;cursor:pointer;margin-top:4px">＋ Q&A追加</button>`
      : `<textarea rows="5" oninput="updateSecBody(${i},this.value)" style="width:100%;box-sizing:border-box;padding:6px 8px;border:1px solid var(--border);border-radius:2px;font-size:12px;font-family:inherit;resize:vertical;line-height:1.7">${escHtml(sec.body||'')}</textarea>`;

    return `
    <div style="border-bottom:1px solid rgba(228,227,227,0.5);padding:14px 16px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        ${photoThumb}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span style="font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 7px;background:${typeColor};color:#fff;border-radius:2px;flex-shrink:0">${typeLabel}</span>
            <button onclick="openPhotoPickerForSection(${i})" style="font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 8px;border:1px solid var(--border);background:none;cursor:pointer;border-radius:2px;color:var(--text2);flex-shrink:0">${sec.photoUrl?'写真変更':'📷'}</button>
            ${sec.photoUrl?`<button onclick="deleteSectionPhoto(${i})" style="font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 8px;border:1px solid rgba(192,52,26,0.3);background:none;cursor:pointer;border-radius:2px;color:var(--hot);flex-shrink:0">🗑 写真削除</button>`:''}
            <button onclick="deleteSection(${i})" style="font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 8px;border:1px solid rgba(192,52,26,0.4);background:rgba(192,52,26,0.06);cursor:pointer;border-radius:2px;color:var(--hot);flex-shrink:0;margin-left:auto">✕ セクション削除</button>
          </div>
          <input value="${escHtml(sec.heading||'')}" placeholder="見出し" oninput="updateSecHeading(${i},this.value)" style="width:100%;box-sizing:border-box;padding:6px 8px;border:1px solid var(--border);border-radius:2px;font-size:13px;font-weight:700;font-family:inherit;color:var(--navy);outline:none">
        </div>
      </div>
      <div>${bodyEditor}</div>
    </div>`;
  }).join('');
}

function deleteSection(i){
  if(!confirm(`セクション「${_articleSections[i].heading||'無題'}」を削除しますか？`)) return;
  _articleSections.splice(i,1);
  renderSectionsList();
}
function updateSecHeading(i,val){ _articleSections[i].heading=val; }
function updateSecBody(i,val){ _articleSections[i].body=val; }
function updateQItem(i,j,field,val){
  if(!_articleSections[i].items) _articleSections[i].items=[];
  if(!_articleSections[i].items[j]) _articleSections[i].items[j]={q:'',a:''};
  _articleSections[i].items[j][field]=val;
}

function clearSectionPhoto(i){
  _articleSections[i].photoUrl='';
  renderSectionsList();
}

// セクション写真をStorageから削除（確認付き）
async function deleteSectionPhoto(i){
  const url = _articleSections[i]?.photoUrl;
  if(!url) return;
  const isStorage = url.includes('/storage/v1/object/public/article-images/');
  const msg = isStorage
    ? 'この写真をセクションから外し、Supabase Storageからも完全削除しますか？\n（写真ライブラリに残す場合は「キャンセル」→「写真変更」で別の写真を選んでください）'
    : 'この写真をセクションから外しますか？';
  if(!confirm(msg)) return;
  if(isStorage && supabaseClient){
    const marker = '/object/public/article-images/';
    const idx = url.indexOf(marker);
    if(idx !== -1){
      const path = url.slice(idx + marker.length);
      await supabaseClient.storage.from('article-images').remove([path]);
      // ライブラリからも削除
      _articlePhotos = _articlePhotos.filter(p => p.url !== url);
      renderPhotoLib();
    }
  }
  _articleSections[i].photoUrl = '';
  renderSectionsList();
  toast('写真を削除しました');
}

// セクション追加
function addSection(type){
  const sec = { type: type||'section', heading:'', body:'', photoUrl:'' };
  if(type==='qa') sec.items = [{q:'',a:''}];
  _articleSections.push(sec);
  // art-parsed が非表示なら表示
  const parsed = document.getElementById('art-parsed');
  if(parsed) parsed.style.display = 'block';
  renderSectionsList();
  // 追加したセクションまでスクロール
  setTimeout(()=>{
    const el = document.getElementById('art-sections-list');
    if(el && el.lastElementChild) el.lastElementChild.scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 80);
}

// Q&Aアイテム追加
function addQaItem(i){
  if(!_articleSections[i].items) _articleSections[i].items=[];
  _articleSections[i].items.push({q:'',a:''});
  renderSectionsList();
}

// Q&Aアイテム削除
function deleteQaItem(i,j){
  if(!confirm(`Q${j+1}を削除しますか？`)) return;
  _articleSections[i].items.splice(j,1);
  renderSectionsList();
}

// 写真ライブラリから削除（Storage含む）
async function deletePhotoFromLib(i){
  const p = _articlePhotos[i];
  if(!p) return;
  const isStorage = p.url.includes('/storage/v1/object/public/article-images/');
  const msg = isStorage
    ? `「${p.name}」をライブラリとSupabase Storageから完全削除しますか？`
    : `「${p.name}」をライブラリから削除しますか？`;
  if(!confirm(msg)) return;
  if(isStorage && supabaseClient){
    const marker = '/object/public/article-images/';
    const idx = p.url.indexOf(marker);
    if(idx !== -1){
      const path = p.url.slice(idx + marker.length);
      const {error} = await supabaseClient.storage.from('article-images').remove([path]);
      if(error){ toast('Storage削除失敗: ' + error.message); return; }
    }
  }
  _articlePhotos.splice(i,1);
  renderPhotoLib();
  toast('削除しました');
}

// ===== 写真ライブラリ =====
function renderPhotoLib(){
  const el=document.getElementById('art-photo-lib');
  if(!el) return;
  if(!_articlePhotos.length){ el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:8px 0">まだ写真がありません</div>'; return; }
  el.innerHTML=_articlePhotos.map((p,i)=>{
    const safeUrl=escHtml(p.url);
    const safeName=escHtml(p.name);
    return `<div style="position:relative;display:inline-block">
      <div style="cursor:pointer" onclick="_assignPhoto(${i})" title="クリックでセクションに割り当て：${safeName}">
        <img src="${safeUrl}" style="width:80px;height:60px;object-fit:cover;border-radius:3px;border:2px solid var(--border);display:block">
        <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(28,42,84,0.7);font-size:8px;color:#fff;padding:2px 4px;border-radius:0 0 3px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${safeName}</div>
      </div>
      <button onclick="event.stopPropagation();deletePhotoFromLib(${i})" title="Storageから削除" style="position:absolute;top:-5px;right:-5px;width:17px;height:17px;background:var(--hot);color:#fff;border:none;border-radius:50%;font-size:10px;cursor:pointer;line-height:1;padding:0;display:flex;align-items:center;justify-content:center">×</button>
    </div>`;
  }).join('');
}

let _pickingForSection = null;
function openPhotoPickerForSection(idx){
  _pickingForSection = idx;
  if(!_articlePhotos.length){
    toast('先に写真をアップロードしてください');
    return;
  }
  // 写真ライブラリにフォーカス
  const lib=document.getElementById('art-photo-lib');
  if(lib){ lib.scrollIntoView({behavior:'smooth'});
    lib.style.outline='2px solid var(--teal)';
    setTimeout(()=>lib.style.outline='',2000);
  }
  document.getElementById('art-upload-status').textContent='写真をクリックしてセクションに割り当てください';
}

function _assignPhoto(photoIdx){
  const p=_articlePhotos[photoIdx];
  if(!p) return;
  assignPhotoToTarget(p.url);
}
function assignPhotoToTarget(url){
  if(_pickingForSection===null){ toast('写真を選択するにはセクションの「写真選択」を押してください'); return; }
  _articleSections[_pickingForSection].photoUrl = url;
  _pickingForSection = null;
  document.getElementById('art-upload-status').textContent='写真を割り当てました ✓';
  renderSectionsList();
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addPhotoByUrl(){
  const input=document.getElementById('art-photo-url-input');
  const url=(input?.value||'').trim();
  if(!url||!url.startsWith('http')){ toast('有効なURLを入力してください'); return; }
  const name=url.split('/').pop().split('?')[0]||'photo';
  _articlePhotos.push({url,name});
  renderPhotoLib();
  if(input) input.value='';
  document.getElementById('art-upload-status').textContent='✓ URLを追加しました';
}

// ===== 写真アップロード =====
async function handlePhotoDrop(e){
  e.preventDefault();
  e.currentTarget.style.borderColor='var(--border)';
  e.currentTarget.style.background='';
  await uploadPhotos(e.dataTransfer.files);
}
async function handlePhotoFileSelect(files){
  await uploadPhotos(files);
}

async function uploadPhotos(files){
  if(!files||!files.length) return;
  const status=document.getElementById('art-upload-status');
  if(status) status.textContent=`${files.length}枚アップロード中...`;

  // Supabase Storage bucketは事前にダッシュボードで作成が必要
  // Storage → New bucket → 名前: article-images → Public: ON

  const uploaded=[];
  for(let file of Array.from(files)){
    if(!file.type.startsWith('image/')){ continue; }
    try{
      let url='';
      if(supabaseClient){
        file=await normalizeImage(file, 1920, 0.85);
        const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
        const path=`articles/${_articleCompanyId||'misc'}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
        const {error:upErr}=await supabaseClient.storage.from('article-images').upload(path,file,{contentType:file.type,upsert:false});
        if(upErr) throw upErr;
        const {data:urlData}=supabaseClient.storage.from('article-images').getPublicUrl(path);
        url=urlData.publicUrl;
      } else {
        // Supabase未接続時：ObjectURL（ローカルのみ）
        url=URL.createObjectURL(file);
      }
      uploaded.push({url, name:file.name});
    }catch(err){
      console.error('upload error:', err);
      if(status) status.textContent=`⚠️ アップロード失敗: ${err.message||err}`;
    }
  }
  _articlePhotos=[..._articlePhotos,...uploaded];
  renderPhotoLib();
  if(status) status.textContent=`✓ ${uploaded.length}枚アップロード完了`;
}

// ===== 保存 =====
async function saveArticle(){
  const companyId=document.getElementById('art-company')?.value;
  if(!companyId){ toast('対象企業を選択してください'); return; }
  if(!_articleSections.length){ toast('記事を解析してください'); return; }

  const statusEl=document.getElementById('art-save-status');
  if(statusEl) statusEl.textContent='保存中...';

  const tags=(document.getElementById('art-tags')?.value||'').split(/[,、,\s　]+/).filter(Boolean);
  const catchphrase=document.getElementById('art-catchphrase')?.value.trim()||'';
  const quote=document.getElementById('art-quote')?.value.trim()||'';
  const companyIntro=document.getElementById('art-intro')?.value.trim()||'';
  const summaryComment=document.getElementById('art-summary-comment')?.value.trim()||'';
  const wantedProfile=document.getElementById('art-wanted')?.value.trim()||'';
  const _q1lines=(document.getElementById('art-q1')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
  const q1=[], q1ax=[];
  _q1lines.forEach(line=>{ const m=line.match(/^([^：:]{1,8})[：:]\s*(.+)$/); const ax=m?labelToAxis(m[1].trim()):''; if(m&&ax){ q1ax.push(ax); q1.push(m[2].trim()); } else { q1.push(line); q1ax.push(q1KeywordAxis(line)); } });
  const cardLabel=(document.getElementById('art-card-label-edit')?.value||document.getElementById('art-card-label')?.value||'').trim();
  // 基本情報
  const coName=document.getElementById('art-co-name')?.value.trim()||'';
  const coCeo=document.getElementById('art-co-ceo')?.value.trim()||'';
  const photoUrl=document.getElementById('art-profile-photo-url')?.value.trim()||'';
  const heroUrl=document.getElementById('art-hero-photo-url')?.value.trim()||'';
  const type=document.getElementById('art-type')?.value||'manager';
  const plan=document.getElementById('art-plan')?.value||'light';
  const articleType=document.getElementById('art-article-type')?.value||'standard';
  const btags=[...document.querySelectorAll('.art-bt:checked')].map(e=>e.value);
  const rtags=[...document.querySelectorAll('.art-rt:checked')].map(e=>e.value);
  const wb={}; document.querySelectorAll('.art-wb').forEach(e=>{ wb[e.getAttribute('data-k')]=parseInt(e.value)||0; });
  const pfwRaw=document.getElementById('art-pf-weight')?.value.trim()||'';
  const pf_weight = pfwRaw==='' ? null : (parseFloat(pfwRaw)||null);

  const companies=loadCompanies();
  const idx=companies.findIndex(c=>String(c.id)===String(companyId));
  if(idx<0){ toast('企業データが見つかりません'); return; }

  companies[idx]={
    ...companies[idx],
    name: coName||companies[idx].name, company: coName||companies[idx].company,
    ceo: coCeo||companies[idx].ceo,
    title: _articleTitle||companies[idx].title,
    body: JSON.stringify(_articleSections),
    tags, catchphrase, quote,
    companyIntro, summaryComment, wantedProfile, q1, q1ax, cardLabel,
    photoUrl, heroUrl, type, plan, articleType, btags, rtags, wb, pf_weight
  };
  saveCompanies(companies);
  if(statusEl) statusEl.textContent='✓ 保存しました！';
  toast('記事を保存しました。');
}
</script>
