<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ソコナラ 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#42AD9F; --teal-d:#2e8c7f; --teal-bg:rgba(66,173,159,0.08);
  --navy:#1C2A54; --gray:#716C6B; --light:#E4E3E3;
  --white:#ffffff; --bg:#F5F5F5; --text:#1a1a1a;
  --text2:#716C6B; --text3:#aaa8a7; --border:#E4E3E3;
  --hot:#c0341a; --hot-bg:rgba(192,52,26,0.07);
  --warm:#b07818; --warm-bg:rgba(176,120,24,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;line-height:1.6;-webkit-font-smoothing:antialiased;}

#gate{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9999;}
#gate-box{text-align:center;}
#gate-title{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:24px;}
#gate-title span{color:var(--teal);}
#gate-input{display:block;width:260px;padding:12px 16px;font-size:14px;font-family:'Noto Sans JP',sans-serif;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.1);color:#fff;outline:none;border-radius:2px;margin:0 auto 12px;}
#gate-input::placeholder{color:rgba(255,255,255,0.4);}
#gate-btn{width:260px;padding:12px;background:var(--teal);color:#fff;border:none;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;border-radius:2px;}
#gate-btn:hover{background:var(--teal-d);}
#gate-err{color:rgba(255,120,120,0.9);font-size:12px;margin-top:10px;display:none;}

#topbar{position:fixed;top:0;left:0;right:0;height:48px;background:var(--navy);display:none;align-items:center;padding:0 20px;gap:16px;z-index:100;}
#topbar-brand{display:flex;align-items:center;}
#topbar-brand img{height:32px;width:auto;display:block;}
#topbar-sub{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.3);}
#logout-btn{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 10px;color:rgba(255,255,255,0.3);background:none;border:1px solid rgba(255,255,255,0.1);cursor:pointer;border-radius:2px;}
#logout-btn:hover{color:rgba(255,255,255,0.7);}

#shell{display:none;padding-top:48px;min-height:100vh;}
.admin-shell{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 48px);}

.admin-sidebar{background:var(--navy);display:flex;flex-direction:column;}
.admin-sidebar-brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.07);}
.admin-brand-title{margin-bottom:4px;display:flex;align-items:center;}
.admin-brand-title img{height:24px;width:auto;display:block;}
.admin-brand-sub{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,0.25);text-transform:uppercase;}
.admin-nav{padding:12px 0;}
.admin-nav-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);padding:0 16px 6px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:12px;color:rgba(255,255,255,0.4);cursor:pointer;border-left:2px solid transparent;transition:all 0.15s;}
.nav-item:hover{color:rgba(255,255,255,0.75);background:rgba(255,255,255,0.04);}
.nav-item.active{color:#fff;border-left-color:var(--teal);background:rgba(66,173,159,0.1);}
.nav-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.co-items{padding:12px 0;border-top:1px solid rgba(255,255,255,0.07);}
.co-item{display:flex;align-items:center;gap:8px;padding:7px 16px;}
.co-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;}
.co-nm{font-size:11px;color:rgba(255,255,255,0.4);flex:1;}
.co-bd{font-family:'JetBrains Mono',monospace;font-size:8px;padding:1px 5px;background:var(--hot);color:#fff;border-radius:2px;}
.sidebar-foot{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(255,255,255,0.07);font-size:10px;color:rgba(255,255,255,0.2);font-family:'JetBrains Mono',monospace;}

.admin-main{display:flex;flex-direction:column;}
.admin-tpbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:48px;display:flex;align-items:center;justify-content:space-between;}
.admin-tpbar-title{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:700;color:var(--navy);}
.admin-tpbar-right{display:flex;gap:8px;}
.abtn{font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:700;padding:5px 14px;cursor:pointer;border-radius:2px;transition:all 0.15s;}
.abtn-teal{background:var(--teal);color:#fff;border:none;}
.abtn-teal:hover{background:var(--teal-d);}
.abtn-ghost{background:none;color:var(--text2);border:1px solid var(--border);}
.abtn-ghost:hover{border-color:var(--teal);color:var(--teal);}
#adminContent{padding:24px;flex:1;}

.panel{background:var(--white);border:1px solid var(--border);border-radius:2px;overflow:hidden;margin-bottom:16px;}
.phdr{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:var(--navy);}
.pbody{padding:16px;}
.pflush{padding:0;}

.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.kpi{background:var(--white);border:1px solid var(--border);padding:14px 16px;border-radius:2px;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.kt::after{background:var(--teal);}
.kpi.kn::after{background:var(--navy);}
.kpi.kh::after{background:var(--hot);}
.kpi.kw::after{background:var(--warm);}
.kpi.kg::after{background:var(--gray);}
.kpi-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:7px;}
.kpi-v{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:900;line-height:1;margin-bottom:4px;}
.kpi-d{font-size:10px;color:var(--teal);}
.kpi-d.neu{color:var(--text3);}

.funnel{display:grid;grid-template-columns:repeat(5,1fr);border:1px solid var(--border);margin-bottom:20px;border-radius:2px;overflow:hidden;}
.fs{padding:12px 14px;border-right:1px solid var(--border);background:var(--white);position:relative;overflow:hidden;}
.fs:last-child{border-right:none;}
.fsv{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.fsn{font-size:11px;font-weight:500;margin-bottom:2px;}
.fsr{font-size:10px;color:var(--teal);font-family:'JetBrains Mono',monospace;}
.fsb{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--teal);}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

.rtable{width:100%;border-collapse:collapse;}
.rtable th{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);text-align:left;padding:7px 12px;background:var(--bg);border-bottom:1px solid var(--border);}
.rtable td{padding:9px 12px;border-bottom:1px solid rgba(228,227,227,0.5);font-size:12px;vertical-align:middle;}
.rtable tr:last-child td{border-bottom:none;}
.rtable tr:hover td{background:var(--bg);}
.tc{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:2px 7px;display:inline-block;border-radius:2px;}
.tch{background:var(--hot-bg);color:var(--hot);border:1px solid rgba(192,52,26,0.2);}
.tcw{background:var(--warm-bg);color:var(--warm);border:1px solid rgba(176,120,24,0.2);}
.tcc{background:rgba(28,42,84,0.06);color:var(--navy);border:1px solid rgba(28,42,84,0.15);}
.sc{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 7px;border-radius:2px;}
.scp{background:rgba(192,52,26,0.08);color:var(--hot);}
.scc{background:rgba(176,120,24,0.08);color:var(--warm);}
.scd{background:var(--teal-bg);color:var(--teal-d);}
.actbtn{font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 9px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text2);border-radius:2px;transition:all 0.15s;}
.actbtn:hover{border-color:var(--teal);color:var(--teal);}
.actbtn.pr{background:var(--teal);color:#fff;border-color:var(--teal);}

.barchart{display:flex;flex-direction:column;gap:7px;}
.barrow{display:flex;align-items:center;gap:8px;}
.barlbl{font-size:11px;color:var(--text2);width:160px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bartrack{flex:1;height:12px;background:var(--bg);position:relative;overflow:hidden;border-radius:1px;}
.barfill{height:100%;background:var(--teal);position:absolute;left:0;top:0;transition:width 1s;border-radius:1px;}
.barcnt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);width:24px;text-align:right;}

.ai-blk{background:var(--navy);color:rgba(255,255,255,0.8);padding:18px;margin-bottom:16px;border-radius:2px;}
.ai-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.ai-tg{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;padding:3px 8px;background:var(--teal);color:#fff;border-radius:2px;}
.ai-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,0.3);}
.ai-txt{font-size:13px;line-height:1.8;margin-bottom:10px;}
.ai-btn{font-family:'JetBrains Mono',monospace;font-size:8px;padding:4px 11px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.4);cursor:pointer;border-radius:2px;transition:all 0.15s;}
.ai-btn:hover{background:rgba(66,173,159,0.2);border-color:var(--teal);color:#fff;}
.ai-load{opacity:0.4;animation:shim 1.4s infinite;height:52px;border-radius:2px;background-size:200% 100%;background-image:linear-gradient(90deg,rgba(255,255,255,0.05) 25%,rgba(255,255,255,0.12) 50%,rgba(255,255,255,0.05) 75%);}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

.tl{display:flex;flex-direction:column;}
.tlrow{display:grid;grid-template-columns:60px 1fr;gap:10px;padding:9px 0;border-bottom:1px solid rgba(228,227,227,0.4);align-items:start;}
.tlrow:last-child{border-bottom:none;}
.tltime{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);padding-top:2px;}
.tlname{font-size:12px;font-weight:500;color:var(--navy);margin-bottom:1px;}
.tldtl{font-size:11px;color:var(--text2);}
.tldot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;}

.ms{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(228,227,227,0.4);}
.ms:last-child{border-bottom:none;}
.mslbl{font-size:12px;color:var(--text2);flex:1;}
.msbar{width:72px;height:4px;background:var(--bg);position:relative;overflow:hidden;border-radius:2px;}
.msfill{position:absolute;left:0;top:0;height:100%;border-radius:2px;transition:width 1s;}
.msval{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:700;color:var(--navy);}

.cogrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.cocard{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--border);cursor:pointer;background:var(--white);transition:all 0.15s;border-radius:2px;}
.cocard:hover{border-color:var(--teal);}
.coav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.conm{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.comt{font-size:11px;color:var(--text2);}
.coarr{margin-left:auto;font-size:14px;color:var(--teal);}

.rpt-out{background:var(--navy);color:rgba(255,255,255,0.8);padding:20px;margin-top:16px;border-radius:2px;}
.rpt-body{font-size:13px;line-height:1.9;}
.rpt-acts{display:flex;gap:8px;margin-top:14px;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--navy);color:#fff;padding:10px 20px;font-size:12px;z-index:999;border-radius:2px;transition:transform 0.3s;box-shadow:0 4px 16px rgba(28,42,84,0.3);}
.toast.show{transform:translateX(-50%) translateY(0);}
.uini{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;}

@media(max-width:768px){
  .admin-shell{grid-template-columns:200px 1fr;}
  .admin-sidebar{display:flex;}
  .kpi-row{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr;}
  .funnel{grid-template-columns:1fr;}
  .cogrid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="gate">
  <div id="gate-box">
    <div id="gate-title"><span style="display:inline-flex;align-items:center;gap:10px"><img src="https://raw.githubusercontent.com/ymiyake-art/sokonara/main/images/logo-02.png" alt="ソコナラ" style="height:32px;width:auto;display:block">管理画面</span></div>
    <input id="gate-input" type="password" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')checkPass()">
    <button id="gate-btn" onclick="checkPass()">ログイン</button>
    <div id="gate-err">パスワードが違います</div>
  </div>
</div>

<div id="topbar">
  <div id="topbar-brand"><img src="https://raw.githubusercontent.com/ymiyake-art/sokonara/main/images/logo-02.png" alt="ソコナラ"></div>
  <div id="topbar-sub">ADMIN</div>
  <a href="index.html" style="font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 10px;color:rgba(255,255,255,0.5);text-decoration:none;border:1px solid rgba(255,255,255,0.15);border-radius:2px;margin-right:4px;" onmouseover="this.style.color='rgba(255,255,255,0.85)'" onmouseout="this.style.color='rgba(255,255,255,0.5)'">&#8592; TOP</a>
  <button id="logout-btn" onclick="logout()">ログアウト</button>
</div>

<div id="shell">
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-brand">
        <div class="admin-brand-title"><img src="https://raw.githubusercontent.com/ymiyake-art/sokonara/main/images/logo-02.png" alt="ソコナラ"></div>
        <div class="admin-brand-sub">Admin Dashboard</div>
      </div>
      <div class="admin-nav">
        <div class="admin-nav-label">メニュー</div>
        <div class="nav-item active" id="ni-dash" onclick="switchTab('dash')"><div class="nav-dot" style="background:var(--teal)"></div>ダッシュボード</div>
        <div class="nav-item" id="ni-reactions" onclick="switchTab('reactions')"><div class="nav-dot" style="background:var(--hot)"></div>反応一覧</div>
        <div class="nav-item" id="ni-interests" onclick="switchTab('interests')"><div class="nav-dot" style="background:#e67e22"></div>興味通知フォーム</div>
        <div class="nav-item" id="ni-contacts" onclick="switchTab('contacts')"><div class="nav-dot" style="background:var(--warm)"></div>接点候補</div>
        <div class="nav-item" id="ni-report" onclick="switchTab('report')"><div class="nav-dot" style="background:var(--navy)"></div>AIレポート</div>
        <div class="nav-item" id="ni-broadcast" onclick="switchTab('broadcast')"><div class="nav-dot" style="background:#06c755"></div>LINE配信</div>
      </div>
      <div class="admin-nav" style="border-top:1px solid rgba(255,255,255,0.07);padding-top:12px;">
        <div class="admin-nav-label">登録・管理</div>
        <div class="nav-item" id="ni-article" onclick="switchTab('article')"><div class="nav-dot" style="background:#f39c12"></div>📝 記事管理</div>
        <div class="nav-item" id="ni-addco" onclick="switchTab('addco')"><div class="nav-dot" style="background:#9b59b6"></div>企業登録</div>
        <div class="nav-item" id="ni-addpj" onclick="switchTab('addpj')"><div class="nav-dot" style="background:#27ae60"></div>共創テーマ登録</div>
        <div class="nav-item" id="ni-colist" onclick="switchTab('colist')"><div class="nav-dot" style="background:var(--teal)"></div>掲載企業一覧</div>
      </div>
      <div class="co-items" id="sidebarCompanies"></div>
      <div class="sidebar-foot">2026年4月<br>次の配信：4月17日</div>
    </aside>
    <div class="admin-main">
      <div class="admin-tpbar">
        <div class="admin-tpbar-title" id="tabTitle">ダッシュボード</div>
        <div class="admin-tpbar-right">
          <button class="abtn abtn-ghost" onclick="toast('CSVを出力しました')">↓ CSV</button>
          <button class="abtn abtn-teal" onclick="switchTab('report')">✦ AIレポート</button>
        </div>
      </div>
      <div id="adminContent"></div>
    </div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const COMPANIES=[];
const REACTIONS=[];
const EMPATHY=[];
const SUPABASE_URL = 'https://ypwwuylcvjwcyazvpibd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwd3d1eWxjdmp3Y3lhenZwaWJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTY1MTMsImV4cCI6MjA5MjI3MjUxM30.7YseXt8libEzFsSAv4bI46l36kZ2lFz_jnh1JphVpvA';
// Vercel設定手順:
// 1) Project Settings -> Environment Variables
// 2) SUPABASE_URL と SUPABASE_KEY を追加（Production/Preview/Development）
// 3) デプロイ後、window.SUPABASE_URL / window.SUPABASE_KEY に注入するスクリプトで参照
const supabaseClient = (SUPABASE_URL && SUPABASE_KEY && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
  : null;
let companiesCache = [];
let projectsCache = [];
let editingCompanyId = null;
let curTab='dash';
function getInitialTab(){
  try{
    const tab = new URLSearchParams(window.location.search).get('tab');
    const valid = ['dash','reactions','interests','contacts','report','broadcast','article','addco','addpj','colist'];
    return valid.includes(tab) ? tab : 'dash';
  }catch{
    return 'dash';
  }
}

async function checkPass(){
  const v = document.getElementById('gate-input').value;
  if(!v){ return; }
  const btn = document.getElementById('gate-btn');
  btn.disabled = true;
  btn.textContent = '確認中...';
  try {
    const res = await fetch('/api/admin-auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: v })
    });
    const data = await res.json();
    if(data.ok){
      document.getElementById('gate').style.display='none';
      document.getElementById('topbar').style.display='flex';
      document.getElementById('shell').style.display='block';
      localStorage.setItem('snAdmin', String(Date.now()));
      loadCompaniesAsync().finally(renderSidebarCompanies);
      loadProjectsAsync();
      switchTab(getInitialTab());
    } else {
      document.getElementById('gate-err').style.display='block';
      document.getElementById('gate-input').value='';
      document.getElementById('gate-input').focus();
    }
  } catch(e) {
    // ローカル開発時（Edge Function未起動）はフォールバック
    console.warn('admin-auth fallback:', e.message);
    document.getElementById('gate-err').textContent = 'サーバーに接続できません。ローカル確認中は直接アクセスしてください。';
    document.getElementById('gate-err').style.display='block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'ログイン';
  }
}
function logout(){localStorage.removeItem('snAdmin');location.reload();}

window.addEventListener('DOMContentLoaded',()=>{
  const ts = parseInt(localStorage.getItem('snAdmin')||'0', 10);
  const validSession = ts > 0 && (Date.now() - ts) < 24 * 60 * 60 * 1000; // 24時間
  if(validSession){
    document.getElementById('gate').style.display='none';
    document.getElementById('topbar').style.display='flex';
    document.getElementById('shell').style.display='block';
    loadCompaniesAsync().finally(renderSidebarCompanies);
    loadProjectsAsync();
    switchTab(getInitialTab());
  } else {
    localStorage.removeItem('snAdmin');
  }
});

function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const ni=document.getElementById('ni-'+tab);
  if(ni) ni.classList.add('active');

function loadCompanies(){
  if(Array.isArray(companiesCache) && companiesCache.length) return companiesCache;
  try{
    const local = JSON.parse(localStorage.getItem('sn_companies')||'[]');
    companiesCache = Array.isArray(local) ? local : [];
  }catch{
    companiesCache = [];
  }
  return companiesCache;
}
function toCompanyRow(c){
  return {
    id:c.id,name:c.name,ceo:c.ceo,type:c.type,plan:c.plan,articleType:c.articleType,
    photoUrl:c.photoUrl||'',industry:c.industry||'',employeeSize:c.employeeSize||'',companyIntro:c.companyIntro||'',
    tags:c.tags||[],title:c.title||'',quote:c.quote||'',body:c.body||'',q1:c.q1||[],fee:c.fee||'',
    catchphrase:c.catchphrase||'',
    status:c.status||'active',created_at:c.created_at||new Date().toISOString(),reactions:c.reactions||0,cta:c.cta||0
  };
}
function fromCompanyRow(r){
  return {...r, created:r.created||new Date(r.created_at||Date.now()).toLocaleDateString('ja-JP')};
}
async function loadCompaniesAsync(){
  if(!supabaseClient) return loadCompanies();
  const {data,error}=await supabaseClient.from('companies').select('*').order('created_at',{ascending:true});
  if(error){ console.warn('companies load fallback:', error.message); return loadCompanies(); }
  companiesCache = (data||[]).map(fromCompanyRow);
  localStorage.setItem('sn_companies', JSON.stringify(companiesCache));
  return companiesCache;
}
function saveCompanies(arr){
  companiesCache = Array.isArray(arr)?arr:[];
  localStorage.setItem('sn_companies',JSON.stringify(companiesCache));
  if(!supabaseClient) return;
  const rows = companiesCache.map(toCompanyRow);
  supabaseClient.from('companies').upsert(rows,{onConflict:'id'}).then(({error})=>{
    if(error){
      console.warn('companies save error:', error.message);
      toast('⚠️ DB保存失敗: ' + error.message.slice(0,60));
    }
  });
}
function loadProjects(){
  if(Array.isArray(projectsCache) && projectsCache.length) return projectsCache;
  try{
    const local = JSON.parse(localStorage.getItem('sn_projects')||'[]');
    projectsCache = Array.isArray(local) ? local : [];
  }catch{
    projectsCache = [];
  }
  return projectsCache;
}
function toProjectRow(p){
  return {
    id:p.id,title:p.title,type:p.type,coType:p.coType,companyId:p.companyId||null,anonymous:!p.companyId,
    duration:p.duration||'',description:p.desc||'',q1:p.q1||[],themes:p.themes||[],involvement:p.involvement||[],
    status:p.status||'active',created_at:p.created_at||new Date().toISOString()
  };
}
function fromProjectRow(r){
  return {
    ...r,
    desc:r.description||r.desc||'',
    created:r.created||new Date(r.created_at||Date.now()).toLocaleDateString('ja-JP')
  };
}
async function loadProjectsAsync(){
  if(!supabaseClient) return loadProjects();
  const {data,error}=await supabaseClient.from('projects').select('*').order('created_at',{ascending:true});
  if(error){ console.warn('projects load fallback:', error.message); return loadProjects(); }
  projectsCache = (data||[]).map(fromProjectRow);
  localStorage.setItem('sn_projects', JSON.stringify(projectsCache));
  return projectsCache;
}
function saveProjects(arr){
  projectsCache = Array.isArray(arr)?arr:[];
  localStorage.setItem('sn_projects',JSON.stringify(projectsCache));
  if(!supabaseClient) return;
  const rows = projectsCache.map(toProjectRow);
  supabaseClient.from('projects').upsert(rows,{onConflict:'id'}).then(({error})=>{
    if(error) console.warn('projects save fallback:', error.message);
  });
}

async function loadLineUsers(){
  const el = document.getElementById('lineUserList');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/interest_forms?select=line_id,form_data,company_name,ceo_name,created_at&line_id=not.is.null&order=created_at.desc`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
    const rows = await res.json();
    const seen = new Set();
    const unique = rows.filter(r=>{ if(seen.has(r.line_id)) return false; seen.add(r.line_id); return true; });
    if(unique.length===0){ el.innerHTML='<div style="font-size:12px;color:var(--text2)">LINE連携済みユーザーはまだいません</div>'; return; }
    el.innerHTML=`<div style="font-size:12px;color:var(--text2);margin-bottom:12px">${unique.length}名が LINE 連携済み</div>`+unique.map(r=>{
      const fd=r.form_data||{};
      const dt=r.created_at?new Date(r.created_at).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}):''
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);flex-wrap:wrap">
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:700;color:var(--navy)">${fd.name||'—'} <span style="font-weight:400;color:var(--text2)">${fd.job||''}</span></div>
          <div style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace">${r.line_id}</div>
        </div>
        <div style="font-size:10px;color:var(--text3)">${r.company_name||''} / ${dt}</div>
        <button onclick="document.getElementById('pushTo').value='${r.line_id}';document.getElementById('adminContent').scrollTop=0" style="font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 8px;border:1px solid var(--teal);background:var(--teal-bg);color:var(--teal-d);border-radius:2px;cursor:pointer;white-space:nowrap">送信先に設定</button>
      </div>`;
    }).join('');
  } catch(e){ el.innerHTML='<div style="font-size:12px;color:var(--hot)">読み込みに失敗しました</div>'; }
}

async function sendBroadcast(){
  const msg = document.getElementById('broadcastMsg').value.trim();
  const resultEl = document.getElementById('broadcastResult');
  if(!msg){ resultEl.textContent='メッセージを入力してください'; resultEl.style.color='var(--hot)'; resultEl.style.display='block'; return; }
  if(!confirm('全友だちにメッセージを送信します。よろしいですか？')) return;
  resultEl.textContent='送信中...'; resultEl.style.color='var(--text2)'; resultEl.style.display='block';
  try {
    const res = await fetch('/api/line-push',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'broadcast',message:msg})});
    const data = await res.json();
    if(data.ok){ resultEl.textContent='✓ 送信しました'; resultEl.style.color='var(--teal-d)'; }
    else { resultEl.textContent='エラー: '+JSON.stringify(data); resultEl.style.color='var(--hot)'; }
  } catch(e){ resultEl.textContent='送信失敗: '+e.message; resultEl.style.color='var(--hot)'; }
}

async function sendPush(){
  const to  = document.getElementById('pushTo').value.trim();
  const msg = document.getElementById('pushMsg').value.trim();
  const resultEl = document.getElementById('pushResult');
  if(!to || !msg){ resultEl.textContent='送信先とメッセージを入力してください'; resultEl.style.color='var(--hot)'; resultEl.style.display='block'; return; }
  resultEl.textContent='送信中...'; resultEl.style.color='var(--text2)'; resultEl.style.display='block';
  try {
    const res = await fetch('/api/line-push',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'push',to,message:msg})});
    const data = await res.json();
    if(data.ok){ resultEl.textContent='✓ 送信しました'; resultEl.style.color='var(--teal-d)'; }
    else { resultEl.textContent='エラー: '+JSON.stringify(data); resultEl.style.color='var(--hot)'; }
  } catch(e){ resultEl.textContent='送信失敗: '+e.message; resultEl.style.color='var(--hot)'; }
}

// ===== 写真アップロード =====
function updatePhotoPreview(){
  const url = document.getElementById('co-photo-url').value.trim();
  const preview = document.getElementById('co-photo-preview');
  const img = document.getElementById('co-photo-img');
  if(url && preview && img){
    img.src = url;
    img.onerror = () => { preview.style.display='none'; };
    img.onload = () => { preview.style.display='block'; };
  } else if(preview){
    preview.style.display='none';
  }
}

async function handlePhotoSelect(e){
  const file = e.target.files?.[0];
  if(!file) return;
  const statusEl = document.getElementById('co-photo-status');
  if(statusEl) statusEl.textContent = 'アップロード中...';
  try {
    const url = await uploadPhoto(file);
    if(url){
      const urlInput = document.getElementById('co-photo-url');
      if(urlInput) urlInput.value = url;
      updatePhotoPreview();
      if(statusEl) statusEl.textContent = '✓ アップロード完了';
      toast('写真をアップロードしました');
    }
  } catch(err) {
    if(statusEl) statusEl.textContent = '⚠️ アップロード失敗';
    toast('写真アップロード失敗: ' + (err.message||err));
  }
  e.target.value = '';
}

async function uploadPhoto(file){
  if(!supabaseClient) throw new Error('Supabaseが初期化されていません');
  const ext = (file.name.split('.').pop()||'jpg').toLowerCase();
  const path = `companies/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
  const { error: upErr } = await supabaseClient.storage
    .from('company-photos')
    .upload(path, file, { cacheControl: '31536000', upsert: false });
  if(upErr) throw upErr;
  const { data } = supabaseClient.storage.from('company-photos').getPublicUrl(path);
  return data.publicUrl;
}

function saveCo(){
  const name=document.getElementById('co-name').value.trim();
  const ceo=document.getElementById('co-ceo').value.trim();
  const title=document.getElementById('co-title').value.trim();
  const quote=document.getElementById('co-quote').value.trim();
  const catchphrase=(document.getElementById('coCatchphrase')?.value||'').trim();
  const body=document.getElementById('co-body').value.trim();
  if(!name||!ceo||!title||!body){ toast('必須項目を入力してください'); return; }
  const q1=[1,2,3,4].map(i=>document.getElementById('co-q'+i).value.trim()).filter(Boolean);
  const isEdit = Boolean(editingCompanyId);
  const arr=loadCompanies();
  const existingCo = isEdit ? (arr.find(x=>x.id===editingCompanyId)||{}) : {};
  const co={
    id: editingCompanyId || ('co_'+Date.now()),
    name,ceo,
    photoUrl:document.getElementById('co-photo-url').value.trim(),
    type:document.getElementById('co-type').value,
    plan:document.getElementById('co-plan').value,
    articleType:document.getElementById('co-article-type').value,
    industry:document.getElementById('co-industry').value.trim(),
    employeeSize:document.getElementById('co-size').value.trim(),
    companyIntro:document.getElementById('co-intro').value.trim(),
    // backward compatibility
    size:document.getElementById('co-size').value.trim(),
    intro:document.getElementById('co-intro').value.trim(),
    tags:document.getElementById('co-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    title,quote,catchphrase,body,q1,
    fee:document.getElementById('co-fee').value||'',
    status:'active',
    created:existingCo.created||new Date().toLocaleDateString('ja-JP'),
    created_at:existingCo.created_at||new Date().toISOString(),
    reactions:existingCo.reactions||0,
    cta:existingCo.cta||0
  };
  if(isEdit){
    const idx = arr.findIndex(x=>x.id===editingCompanyId);
    if(idx>=0) arr[idx]=co; else arr.push(co);
  }else{
    arr.push(co);
  }
  saveCompanies(arr);
  renderSidebarCompanies();
  toast(isEdit ? `「${name}」を更新しました` : `「${name}」を登録しました`);
  editingCompanyId = null;
  setTimeout(()=>switchTab('colist'),800);
}

  if(!co){ toast('企業データが見つかりません'); return; }
  editingCompanyId = id;

function markArticleTypeManual(){
  const at = document.getElementById('co-article-type');
  if(at) at.dataset.manual = '1';
  updateBodyCounter();
}

function syncArticleTypeFromPlan(force = false){
  const plan = document.getElementById('co-plan');
  const at = document.getElementById('co-article-type');
  if(!plan || !at) return;
  const next = plan.value === 'standard' ? 'standard' : 'light';
  if(force || at.dataset.manual !== '1'){
    at.value = next;
  }
  updateBodyCounter();
}

function updateBodyCounter(){
  const body = document.getElementById('co-body');
  const at = document.getElementById('co-article-type');
  const counter = document.getElementById('co-body-counter');
  if(!body || !at || !counter) return;
  const limit = at.value === 'standard' ? 2000 : 800;
  const len = body.value.trim().length;
  counter.textContent = `${len} / ${limit}`;
  counter.style.color = len > limit ? 'var(--hot)' : 'var(--text3)';
  body.placeholder = at.value === 'standard'
    ? '1500〜2000字推奨。写真は ![説明](URL) 形式で差し込み可'
    : '〜800字推奨';
}

function initArticleTypeControls(){
  const at = document.getElementById('co-article-type');
  if(at) at.dataset.manual = '0';
  syncArticleTypeFromPlan(true);
  updateBodyCounter();
}

async function genCoArticle(){
  const name=document.getElementById('co-name').value.trim();
  const ceo=document.getElementById('co-ceo').value.trim();
  const type=document.getElementById('co-type').value;
  const hint=document.getElementById('co-body').value.trim();
  if(!name||!ceo){ toast('会社名と経営層名を入力してからAI生成してください'); return; }
  const btn=document.querySelector('button[onclick="genCoArticle()"]');
  btn.textContent='生成中...'; btn.disabled=true;
  const result=document.getElementById('co-ai-result');
  result.style.display='block';
  result.innerHTML='<div class="ai-load" style="height:40px"></div>';
  const typeLabel={successor:'後継者・アトツギ',second_founding:'第二創業',new_biz:'新規事業責任者'}[type]||type;
  try{
    const res=await fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system:'あなたはソコナラ（地域キャリア共創プラットフォーム）の記事ライターです。経営層の人物像・ストーリーを伝える記事をJSON形式のみで生成してください（前置き・コードブロック不要）。\n形式：{"title":"記事タイトル（20〜30字）","quote":"一番刺さるフレーズ（30〜50字）","body":"記事本文（400〜600字）","q1":["選択肢1","選択肢2","選択肢3","選択肢4"]}',
        user:`会社名：${name}\n経営層名：${ceo}\nタイプ：${typeLabel}\nヒント・背景情報：${hint||'特になし'}`
      })});
    const d=await res.json();
    const m=d.content[0].text.match(/\{[\s\S]*\}/);
    if(m){
      const p=JSON.parse(m[0]);
      document.getElementById('co-title').value=p.title||'';
      document.getElementById('co-quote').value=p.quote||'';
      if(document.getElementById('coCatchphrase')) document.getElementById('coCatchphrase').value=p.catchphrase||'';
      document.getElementById('co-body').value=p.body||'';
      [1,2,3,4].forEach((i,idx)=>{ const el=document.getElementById('co-q'+i); if(el) el.value=p.q1?.[idx]||''; });
      result.innerHTML='<span style="color:var(--teal);font-size:11px">✓ AI生成完了。内容を確認して「登録する」を押してください。</span>';
    }
  }catch{
    result.innerHTML='<span style="color:rgba(255,100,100,0.8);font-size:11px">生成に失敗しました。手動で入力してください。</span>';
  }
  btn.textContent='✦ AIで記事を生成'; btn.disabled=false;
}

            <textarea id="art-q1" rows="4" style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid var(--border);border-radius:2px;font-size:12px;font-family:inherit;resize:vertical"></textarea>
          </div>
        </div>
      </div>

      <!-- 保存 -->
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:40px">
        <button class="abtn abtn-teal" style="font-size:14px;padding:12px 32px" onclick="saveArticle()">💾 Supabaseに保存する</button>
        <div id="art-save-status" style="font-size:12px;color:var(--text2)"></div>
      </div>

    </div>
  </div>`;

  // 既存の写真ライブラリを再描画
  _articlePhotos = [];
  _articleSections = [];
  _articleCompanyId = null;
  renderPhotoLib();
}

function onArtCompanyChange(id){
  _articleCompanyId = id || null;
  if(!id) return;
  // 既存データを読み込んでフォームに反映
  const co = loadCompanies().find(c=>String(c.id)===String(id));
  if(!co) return;
  const parsed = document.getElementById('art-parsed');
  // bodyがJSONならセクションを復元
  if(co.body && co.body.trimStart().startsWith('[')){
    try{
      _articleSections = JSON.parse(co.body);
      _articleTitle = co.title||'';
      if(parsed) parsed.style.display='block';
      renderSectionsList();
      fillMeta({
        tags: co.tags||[],
        catchphrase: co.catchphrase||'',
        quote: co.quote||'',
        companyIntro: co.companyIntro||'',
        q1: co.q1||[]
      });
      toast('既存の記事データを読み込みました');
    }catch(e){}
  }
}

// ===== Notion パーサー =====
function parseNotionPaste(){
  const text = document.getElementById('art-notion-paste').value;
  if(!text.trim()){ toast('テキストを貼り付けてください'); return; }
  const result = parseNotion(text);
  _articleTitle = result.title;
  _articleSections = result.sections;
  _articleMeta = result.meta;
  document.getElementById('art-parsed').style.display = 'block';
  renderSectionsList();
  fillMeta(result.meta);
  toast(`解析完了：セクション ${result.sections.length} 個`);
}

function parseNotion(text){
  const lines = text.split('\n');
  let title = '';
  const sections = [];
  const meta = { tags:[], quote:'', catchphrase:'', q1:[], companyIntro:'' };
  let current = null;
  let inMeta = false;
  let inQ1 = false;

  for(let i=0;i<lines.length;i++){
    const line = lines[i];
    // タイトル
    if(line.startsWith('# ') && !line.startsWith('## ') && !title){
      title = line.slice(2).trim(); continue;
    }
    // セクション見出し
    if(line.startsWith('## ')){
      if(current && !inMeta) pushSection(current, sections);
      const heading = line.slice(3).trim();
      inMeta = heading.includes('📋') || heading.includes('プラットフォーム登録');
      inQ1 = false;
      if(inMeta || heading.includes('元情報')){ current=null; continue; }
      const type = (heading.includes('に伺いました')||heading.includes('インタビュー')) ? 'qa' : 'section';
      current = { heading, lines:[], type };
      continue;
    }
    if(line.trim()==='---') continue;
    // メタデータ解析
    if(inMeta){
      const bm = line.match(/^\*\*(.+?)\*\*/);
      if(bm){
        const k = bm[1];
        if(k==='タグ'){
          const v=line.replace(/^\*\*タグ\*\*\s*/,'').trim();
          meta.tags=v.split(/[,、,\s　]+/).filter(Boolean);
        } else if(k==='引用フレーズ'){
          meta.quote=line.replace(/^\*\*引用フレーズ\*\*\s*/,'').replace(/^「|」$/g,'').trim();
        } else if(k==='キャッチフレーズ'){
          meta.catchphrase=line.replace(/^\*\*キャッチフレーズ\*\*\s*/,'').trim();
        } else if(k.includes('Q1選択肢')){
          inQ1=true;
        } else if(k==='会社一言紹介'){
          // Look-ahead: collect lines until next ** key
          let j=i+1;
          const introParts=[];
          while(j<lines.length){
            if(lines[j].match(/^\*\*/)||lines[j].startsWith('##')) break;
            if(lines[j].trim()) introParts.push(lines[j].trim());
            j++;
          }
          meta.companyIntro=introParts.join('\n');
          i=j-1;
        }
      }
      if(inQ1 && line.startsWith('- ')){
        const choice=line.slice(2).replace(/^[^：:]+[：:]\s*/,'').trim();
        if(choice) meta.q1.push(choice);
      }
      continue;
    }
    if(current) current.lines.push(line);
  }
  if(current && !inMeta) pushSection(current, sections);
  return {title, sections, meta};
}

function pushSection(sec, sections){
  const bodyLines = sec.lines.filter(l=>l.trim()&&l.trim()!=='---');
  if(sec.type==='qa'){
    const items=[];
    let cq=null, ca=[];
    for(const l of bodyLines){
      // **――…** or **――…？** patterns
      const qm=l.match(/^\*\*――?\s*(.+?)\*\*$/)||l.match(/^\*\*[―-]{1,2}\s*(.+?)\*\*$/);
      if(qm){ if(cq!==null) items.push({q:cq,a:ca.join('\n').trim()}); cq=qm[1].trim(); ca=[]; }
      else if(cq!==null&&l.trim()) ca.push(l.trim());
    }
    if(cq!==null) items.push({q:cq,a:ca.join('\n').trim()});
    sections.push({type:'qa',heading:sec.heading,items,photoUrl:''});
  } else {
    const body = bodyLines.join('\n').trim();
    if(!body) return;
    sections.push({type:'section',heading:sec.heading,body,photoUrl:''});
  }
}

function fillMeta(meta){
  const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.value=v||''; };
  set('art-tags', (meta.tags||[]).join(', '));
  set('art-catchphrase', meta.catchphrase||'');
  set('art-quote', meta.quote||'');
  set('art-intro', meta.companyIntro||'');
  const q1El=document.getElementById('art-q1');
  if(q1El) q1El.value=(meta.q1||[]).join('\n');
}

// ===== セクション一覧 =====
function renderSectionsList(){
  const el=document.getElementById('art-sections-list');
  if(!el) return;
  if(!_articleSections.length){ el.innerHTML='<div style="padding:20px;font-size:12px;color:var(--text3)">セクションがありません</div>'; return; }
  el.innerHTML = _articleSections.map((sec,i)=>{
    const typeLabel={section:'本文',qa:'Q&A',lead:'リード'}[sec.type]||'本文';
    const typeColor={section:'var(--teal)',qa:'var(--navy)',lead:'#e67e22'}[sec.type]||'var(--teal)';
    const bodyPreview = sec.type==='qa'
      ? `Q: ${(sec.items||[])[0]?.q||''}…`
      : (sec.body||'').slice(0,80)+'…';
    const photoThumb = sec.photoUrl
      ? `<img src="${sec.photoUrl}" style="width:64px;height:48px;object-fit:cover;border-radius:3px;border:2px solid var(--teal);flex-shrink:0">`
      : `<div style="width:64px;height:48px;border:2px dashed var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--border);flex-shrink:0;cursor:pointer" onclick="openPhotoPickerForSection(${i})" title="写真を選択">+</div>`;
    return `
    <div style="display:grid;grid-template-columns:auto 1fr auto;gap:14px;padding:14px 16px;border-bottom:1px solid rgba(228,227,227,0.5);align-items:start">
      ${photoThumb}
      <div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 7px;background:${typeColor};color:#fff;border-radius:2px">${typeLabel}</span>
          <span style="font-size:13px;font-weight:700;color:var(--navy)">${escHtml(sec.heading)}</span>
        </div>
        <div style="font-size:11px;color:var(--text2);line-height:1.7">${escHtml(bodyPreview)}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
        <button onclick="openPhotoPickerForSection(${i})" style="font-family:'JetBrains Mono',monospace;font-size:8px;padding:4px 10px;border:1px solid var(--border);background:none;cursor:pointer;border-radius:2px;white-space:nowrap;color:var(--text2)">${sec.photoUrl?'写真変更':'📷 写真選択'}</button>
        ${sec.photoUrl?`<button onclick="clearSectionPhoto(${i})" style="font-family:'JetBrains Mono',monospace;font-size:8px;padding:4px 10px;border:1px solid rgba(192,52,26,0.3);background:none;cursor:pointer;border-radius:2px;color:var(--hot)">削除</button>`:''}
      </div>
    </div>`;
  }).join('');
}

function clearSectionPhoto(i){
  _articleSections[i].photoUrl='';
  renderSectionsList();
}

// ===== 写真ライブラリ =====
function renderPhotoLib(){
  const el=document.getElementById('art-photo-lib');
  if(!el) return;
  if(!_articlePhotos.length){ el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:8px 0">まだ写真がありません</div>'; return; }
  el.innerHTML=_articlePhotos.map((p,i)=>`
    <div style="position:relative;cursor:pointer" onclick="assignPhotoToTarget('${p.url}')" title="${p.name}">
      <img src="${p.url}" style="width:80px;height:60px;object-fit:cover;border-radius:3px;border:2px solid var(--border);display:block">
      <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(28,42,84,0.7);font-size:8px;color:#fff;padding:2px 4px;border-radius:0 0 3px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
    </div>
  `).join('');
}

let _pickingForSection = null;
function openPhotoPickerForSection(idx){
  _pickingForSection = idx;
  if(!_articlePhotos.length){
    toast('先に写真をアップロードしてください');
    return;
  }
  // 写真ライブラリにフォーカス
  const lib=document.getElementById('art-photo-lib');
  if(lib){ lib.scrollIntoView({behavior:'smooth'});
    lib.style.outline='2px solid var(--teal)';
    setTimeout(()=>lib.style.outline='',2000);
  }
  document.getElementById('art-upload-status').textContent='写真をクリックしてセクションに割り当てください';
}

function assignPhotoToTarget(url){
  if(_pickingForSection===null){ toast('写真を選択するにはセクションの「写真選択」を押してください'); return; }
  _articleSections[_pickingForSection].photoUrl = url;
  _pickingForSection = null;
  document.getElementById('art-upload-status').textContent='写真を割り当てました ✓';
  renderSectionsList();
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== 写真アップロード =====
async function handlePhotoDrop(e){
  e.preventDefault();
  e.currentTarget.style.borderColor='var(--border)';
  e.currentTarget.style.background='';
  await uploadPhotos(e.dataTransfer.files);
}
async function handlePhotoFileSelect(files){
  await uploadPhotos(files);
}

async function uploadPhotos(files){
  if(!files||!files.length) return;
  const status=document.getElementById('art-upload-status');
  if(status) status.textContent=`${files.length}枚アップロード中...`;

  // Supabase Storage bucketは事前にダッシュボードで作成が必要
  // Storage → New bucket → 名前: article-images → Public: ON

  const uploaded=[];
  for(const file of Array.from(files)){
    if(!file.type.startsWith('image/')){ continue; }
    try{
      let url='';
      if(supabaseClient){
        const ext=file.name.split('.').pop().toLowerCase();
        const path=`articles/${_articleCompanyId||'misc'}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
        const {error:upErr}=await supabaseClient.storage.from('article-images').upload(path,file,{contentType:file.type,upsert:false});
        if(upErr) throw upErr;
        const {data:urlData}=supabaseClient.storage.from('article-images').getPublicUrl(path);
        url=urlData.publicUrl;
      } else {
        // Supabase未接続時：ObjectURL（ローカルのみ）
        url=URL.createObjectURL(file);
      }
      uploaded.push({url, name:file.name});
    }catch(err){
      console.error('upload error:', err);
      if(status) status.textContent=`⚠️ アップロード失敗: ${err.message||err}`;
    }
  }
  _articlePhotos=[..._articlePhotos,...uploaded];
  renderPhotoLib();
  if(status) status.textContent=`✓ ${uploaded.length}枚アップロード完了`;
}

// ===== 保存 =====
async function saveArticle(){
  const companyId=document.getElementById('art-company')?.value;
  if(!companyId){ toast('対象企業を選択してください'); return; }
  if(!_articleSections.length){ toast('記事を解析してください'); return; }

  const statusEl=document.getElementById('art-save-status');
  if(statusEl) statusEl.textContent='保存中...';

  const tags=(document.getElementById('art-tags')?.value||'').split(/[,、,\s　]+/).filter(Boolean);
  const catchphrase=document.getElementById('art-catchphrase')?.value.trim()||'';
  const quote=document.getElementById('art-quote')?.value.trim()||'';
  const companyIntro=document.getElementById('art-intro')?.value.trim()||'';
  const q1=(document.getElementById('art-q1')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);

  const companies=loadCompanies();
  const idx=companies.findIndex(c=>String(c.id)===String(companyId));
  if(idx<0){ toast('企業データが見つかりません'); return; }

  companies[idx]={
    ...companies[idx],
    title: _articleTitle||companies[idx].title,
    body: JSON.stringify(_articleSections),
    tags, catchphrase, quote,
    companyIntro, q1,
    articleType:'standard'
  };
  saveCompanies(companies);
  if(statusEl) statusEl.textContent='✓ 保存しました！';
  toast('記事を保存しました。');
}
</script>
