<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ソコナラ｜課題から探す（v2プロトタイプ）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#42AD9F; --teal-d:#2e8c7f; --teal-bg:rgba(66,173,159,0.08);
  --bg:#F5F5F5; --text:#1a1a1a; --text2:#716C6B; --text3:#aaa8a7; --border:#E4E3E3;
  --red:#E2725B; --red-bg:rgba(226,114,91,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  overflow:hidden; user-select:none;
}
.wrap{
  max-width:480px; margin:0 auto; height:100dvh;
  display:flex; flex-direction:column;
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
}
.head{
  padding:16px 20px 8px; text-align:center;
}
.kicker{
  font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:2px;
  text-transform:uppercase; color:var(--text3); margin-bottom:6px;
}
.head h1{
  font-family:'Zen Kaku Gothic New',sans-serif; font-size:16px; font-weight:700;
  line-height:1.5;
}
.head .sub{ font-size:12px; color:var(--text2); margin-top:6px; line-height:1.6;}

/* progress dots */
.prog{ display:flex; justify-content:center; gap:7px; padding:14px 0 4px;}
.pdot{ width:7px;height:7px;border-radius:50%;background:var(--border);transition:all .25s;}
.pdot.done{ background:var(--teal);}
.pdot.active{ background:var(--teal); transform:scale(1.5);}

/* card stack */
.stage{ flex:1; position:relative; margin:8px 20px 0; }
.card{
  position:absolute; inset:0;
  background:#fff; border-radius:20px; border:1px solid var(--border);
  box-shadow:0 8px 30px rgba(0,0,0,0.08);
  display:flex; flex-direction:column; justify-content:space-between;
  padding:26px 24px; cursor:grab;
  will-change:transform;
  transition:transform .0s;
}
.card.anim{ transition:transform .35s cubic-bezier(.22,1,.36,1), opacity .35s;}
.card .tagrow{ display:flex; gap:6px; flex-wrap:wrap;}
.card .tag{
  font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px;
  color:var(--teal-d); background:var(--teal-bg); padding:4px 9px; border-radius:20px;
}
.card .body{ display:flex; flex-direction:column; justify-content:center; flex:1;}
.card .ctitle{
  font-family:'Zen Kaku Gothic New',sans-serif; font-size:23px; font-weight:700;
  line-height:1.55; letter-spacing:.5px;
}
.card .leader{ font-size:12px; color:var(--text2); margin-top:18px; line-height:1.5;}
.card .leader b{ color:var(--text); font-weight:700;}

/* swipe stamps */
.stamp{
  position:absolute; top:26px; font-family:'JetBrains Mono',monospace; font-weight:700;
  font-size:18px; letter-spacing:1px; padding:6px 12px; border-radius:8px; border:3px solid;
  opacity:0; transform:rotate(-12deg); pointer-events:none;
}
.stamp.like{ right:24px; color:var(--teal); border-color:var(--teal); transform:rotate(12deg);}
.stamp.nope{ left:24px; color:var(--red); border-color:var(--red);}

/* action buttons */
.actions{ display:flex; justify-content:center; gap:28px; padding:18px 0 10px;}
.abtn{
  width:62px;height:62px;border-radius:50%; border:1px solid var(--border);
  background:#fff; display:flex;align-items:center;justify-content:center;
  font-size:26px; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,0.06);
  transition:transform .12s;
}
.abtn:active{ transform:scale(.9);}
.abtn.nope{ color:var(--red);}
.abtn.like{ color:var(--teal); width:70px;height:70px;font-size:30px;}
.hint{ text-align:center; font-size:11px; color:var(--text3); padding-bottom:8px;}

/* result */
#result{ display:none; flex:1; flex-direction:column; padding:24px 24px 30px; overflow-y:auto;}
#result h2{ font-family:'Zen Kaku Gothic New',sans-serif; font-size:20px; font-weight:700; line-height:1.5;}
#result .lead{ font-size:13px;color:var(--text2);margin:8px 0 20px;line-height:1.7;}
.rankrow{ display:flex;align-items:center;gap:10px; margin-bottom:10px;}
.rankrow .num{ font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--teal); width:22px;}
.rankrow .barwrap{ flex:1; background:var(--border); height:10px; border-radius:6px; overflow:hidden;}
.rankrow .bar{ display:block; height:100%; background:var(--teal); border-radius:6px;}
.rankrow .lbl{ font-size:12px; width:84px;}
.reco{
  margin-top:24px; background:#fff;border:1px solid var(--border);border-radius:16px;
  padding:20px; box-shadow:0 4px 16px rgba(0,0,0,0.05);
}
.reco .rk{ font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;}
.reco .rt{ font-family:'Zen Kaku Gothic New',sans-serif;font-size:18px;font-weight:700;line-height:1.5;margin:8px 0;}
.reco .rl{ font-size:12px;color:var(--text2);}
.btn-primary{
  margin-top:22px; width:100%; padding:15px; border:none; border-radius:10px;
  background:var(--teal); color:#fff; font-family:'Noto Sans JP',sans-serif;
  font-size:15px;font-weight:700; cursor:pointer;
}
.btn-text{ margin-top:12px;width:100%;background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;text-decoration:underline;}

.devnote{ text-align:center;font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;padding:6px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="kicker">CHALLENGE CARDS</div>
    <h1 id="hTitle">自分なら力になれるかも。<br>そう思える課題を選ぼう。</h1>
    <div class="sub" id="hSub">気になる課題は <b>右</b> へ、ピンとこなければ <b>左</b> へスワイプ。</div>
  </div>

  <div class="prog" id="prog"></div>

  <div class="stage" id="stage"></div>

  <div class="actions" id="actions">
    <button class="abtn nope" onclick="swipe('left')">✕</button>
    <button class="abtn like" onclick="swipe('right')">♥</button>
  </div>
  <div class="hint">ドラッグでもボタンでも選べます</div>

  <!-- RESULT -->
  <div id="result">
    <h2>あなたが惹かれた課題</h2>
    <div class="lead">スワイプの結果から、関心の方向を整理しました。</div>
    <div id="ranks"></div>
    <div class="reco" id="reco"></div>
    <button class="btn-primary" onclick="alert('（プロトタイプ）この経営層の記事ページへ遷移します')">この経営層の記事を読む →</button>
    <button class="btn-text" onclick="restart()">もう一度カードを選ぶ</button>
  </div>

  <div class="devnote">v2 prototype — pf.sokonara.co.jp</div>
</div>

<script>
// ---- カードデータ（CARDS_draft_v2.md より。後でSupabase or 確定文に差し替え）----
const TAG_LABEL = {dx:'DX・IT', newbiz:'新規事業', local:'地方創生', expertise:'専門性', orgchange:'組織変革', growth:'自己成長', global:'海外志向'};
const CARDS = [
  {id:'card_schoo_inoue', title:'九州で「学びが当たり前にある」社会を、事業として成り立たせたい', leader:'井上真吾', company:'株式会社Schoo', tags:['newbiz','local']},
  {id:'card_schoo_sonoda', title:'学びで地域の選択肢を増やす拠点を、福岡にゼロからつくりたい', leader:'園田圭輔', company:'株式会社Schoo', tags:['local','newbiz']},
  {id:'card_ruby_inaba', title:'生成AI時代に、エンジニアの価値の出し方をチームで作り直したい', leader:'稲葉さん', company:'株式会社Ruby開発', tags:['dx','orgchange']},
  {id:'card_excees_ueno', title:'IT×XRで、福岡発の強い受託開発会社を第2創業期からつくりたい', leader:'上野さん', company:'株式会社エクシーズ', tags:['dx','newbiz']},
  {id:'card_ishikura', title:'「建材で地球を救う」遮熱シートを、福岡から全国へ広げたい', leader:'石蔵商店 代表', company:'石蔵商店 建材事業部', tags:['newbiz','growth']},
  {id:'card_ad_koga', title:'紙の印刷会社を、データとDXで中小企業を元気にする販促パートナーに変えたい', leader:'古賀さん', company:'アド印刷株式会社', tags:['dx','expertise']},
];

let deck=[], idx=0, picked=[], dropped=[];

function initProg(){
  const p=document.getElementById('prog'); p.innerHTML='';
  deck.forEach((_,i)=>{ const d=document.createElement('div'); d.className='pdot'+(i<idx?' done':i===idx?' active':''); p.appendChild(d);});
}
function renderStack(){
  const stage=document.getElementById('stage'); stage.innerHTML='';
  // render up to 3 cards from top (idx) for depth
  for(let i=Math.min(idx+2, deck.length-1); i>=idx; i--){
    const c=deck[i]; if(!c) continue;
    const el=document.createElement('div'); el.className='card'; el.dataset.i=i;
    const depth=i-idx;
    el.style.transform=`scale(${1-depth*0.04}) translateY(${depth*10}px)`;
    el.style.zIndex=100-depth;
    el.innerHTML=`
      <div class="stamp like">関わりたい</div>
      <div class="stamp nope">スキップ</div>
      <div class="tagrow">${c.tags.map(t=>`<span class="tag">${TAG_LABEL[t]||t}</span>`).join('')}</div>
      <div class="body"><div class="ctitle">${c.title}</div></div>
      <div class="leader">この課題に向き合う経営層<br><b>${c.company}　${c.leader}</b></div>`;
    stage.appendChild(el);
    if(depth===0) attachDrag(el);
  }
  initProg();
}

let drag=null;
function attachDrag(el){
  let startX=0,startY=0,curX=0,curY=0,active=false;
  const down=(x,y)=>{ active=true; startX=x; startY=y; el.style.transition='none'; el.style.cursor='grabbing';};
  const move=(x,y)=>{ if(!active)return; curX=x-startX; curY=y-startY;
    const rot=curX/18;
    el.style.transform=`translate(${curX}px,${curY}px) rotate(${rot}deg)`;
    const op=Math.min(Math.abs(curX)/120,1);
    el.querySelector('.stamp.like').style.opacity=curX>0?op:0;
    el.querySelector('.stamp.nope').style.opacity=curX<0?op:0;
  };
  const up=()=>{ if(!active)return; active=false; el.style.cursor='grab';
    if(curX>110){ flyOut(el,'right'); }
    else if(curX<-110){ flyOut(el,'left'); }
    else { el.classList.add('anim'); el.style.transform=''; el.querySelectorAll('.stamp').forEach(s=>s.style.opacity=0);
      setTimeout(()=>el.classList.remove('anim'),350); }
    curX=0;curY=0;
  };
  el.addEventListener('touchstart',e=>down(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  el.addEventListener('touchmove',e=>move(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  el.addEventListener('touchend',up);
  el.addEventListener('mousedown',e=>down(e.clientX,e.clientY));
  window.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  window.addEventListener('mouseup',up);
}

function flyOut(el,dir){
  el.classList.add('anim');
  const x=dir==='right'?700:-700;
  el.style.transform=`translate(${x}px,40px) rotate(${dir==='right'?30:-30}deg)`;
  el.style.opacity='0';
  recordChoice(dir);
  setTimeout(()=>{ idx++; afterAdvance(); },300);
}
function swipe(dir){
  const top=document.querySelector(`.card[data-i="${idx}"]`);
  if(top) flyOut(top,dir);
}
function recordChoice(dir){
  const c=deck[idx]; if(!c)return;
  if(dir==='right') picked.push(c); else dropped.push(c);
}
function afterAdvance(){
  const total=deck.length;
  // 仮結果: 3枚で出せる。5枚 or 全部で確定。ここでは全部めくったら結果へ。
  if(idx>=total){ showResult(); return; }
  renderStack();
}

function showResult(){
  document.getElementById('stage').style.display='none';
  document.getElementById('actions').style.display='none';
  document.querySelector('.hint').style.display='none';
  document.getElementById('prog').style.display='none';
  document.querySelector('.head').style.display='none';
  const r=document.getElementById('result'); r.style.display='flex';

  // タグ集計（pickedのみ）
  const cnt={};
  picked.forEach(c=>c.tags.forEach(t=>cnt[t]=(cnt[t]||0)+1));
  const ranked=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  const max=ranked.length?ranked[0][1]:1;
  document.getElementById('ranks').innerHTML = ranked.length
    ? ranked.slice(0,3).map(([t,n],i)=>`
      <div class="rankrow"><span class="num">${i+1}</span>
        <span class="lbl">${TAG_LABEL[t]||t}</span>
        <span class="barwrap"><span class="bar" style="width:${Math.round(n/max*100)}%"></span></span></div>`).join('')
    : '<div class="lead">「関わりたい」が選ばれませんでした。もう一度試してみてください。</div>';

  // レコメンド: 上位タグを最も多く持つpickedカード
  let reco=picked[0];
  if(ranked.length){
    const topTags=ranked.slice(0,2).map(x=>x[0]);
    reco = picked.slice().sort((a,b)=>
      b.tags.filter(t=>topTags.includes(t)).length - a.tags.filter(t=>topTags.includes(t)).length
    )[0];
  }
  document.getElementById('reco').innerHTML = reco ? `
    <div class="rk">おすすめの経営層</div>
    <div class="rt">${reco.title}</div>
    <div class="rl">${reco.company}　${reco.leader}</div>` : '';
}

function restart(){
  idx=0; picked=[]; dropped=[];
  deck=CARDS.slice().sort(()=>Math.random()-0.5);
  document.getElementById('stage').style.display='';
  document.getElementById('actions').style.display='flex';
  document.querySelector('.hint').style.display='';
  document.getElementById('prog').style.display='flex';
  document.querySelector('.head').style.display='';
  document.getElementById('result').style.display='none';
  renderStack();
}

restart();
</script>
</body>
</html>
